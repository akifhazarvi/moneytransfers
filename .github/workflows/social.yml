name: Daily Social Digest

on:
  schedule:
    # Mon-Fri at 09:00 UTC (~10am UK, ~5am ET, ~2:30pm IST)
    - cron: "0 9 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (generate but don't post)"
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Post daily digest
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_COMPANY_ID: "112899026"
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: npx tsx scripts/social/post-daily.ts
