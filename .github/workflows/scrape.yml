name: Scrape Provider Data (Fast - API)

on:
  schedule:
    # Once per day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-api:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Scrape OFX (direct API)
        run: npx tsx scripts/scrape-ofx.ts
        timeout-minutes: 8
        continue-on-error: true

      - name: Scrape Instarem (direct API)
        run: npx tsx scripts/scrape-instarem.ts
        timeout-minutes: 5
        continue-on-error: true

      - name: Scrape XE mid-market rates
        run: npx tsx scripts/scrape-xe.ts
        timeout-minutes: 5
        continue-on-error: true

      - name: Scrape TapTap Send (Partner API)
        run: npx tsx scripts/scrape-taptapsend.ts
        env:
          TAPTAP_PARTNER_API_KEY: ${{ secrets.TAPTAP_PARTNER_API_KEY }}
        timeout-minutes: 5
        continue-on-error: true

      - name: Scrape Wise Direct (API)
        run: npx tsx scripts/scrape-wise-direct.ts
        timeout-minutes: 8
        continue-on-error: true

      - name: Scrape Wise Comparison — all providers (API)
        run: npx tsx scripts/scrape-wise-comparison.ts
        timeout-minutes: 10
        continue-on-error: true

      - name: Scrape Exiap / TheCurrencyShop (Cheerio JSON-LD)
        run: npx tsx scripts/scrape-exiap.ts
        timeout-minutes: 8
        continue-on-error: true

      - name: Scrape Remitly (direct API)
        run: npx tsx scripts/scrape-remitly.ts
        timeout-minutes: 8
        continue-on-error: true

      - name: Scrape ACE Money Transfer (HTML)
        run: npx tsx scripts/scrape-ace.ts
        timeout-minutes: 5
        continue-on-error: true

      - name: Scrape PandaRemit (CNY corridors API)
        run: npx tsx scripts/scrape-pandaremit.ts
        timeout-minutes: 5
        continue-on-error: true

      - name: Scrape SkyRemit (CNY corridors API)
        run: npx tsx scripts/scrape-skyremit.ts
        timeout-minutes: 5
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Aggregate historical data
        run: npx tsx scripts/aggregate-history.ts

      - name: Build rate insights
        run: npx tsx scripts/build-rate-insights.ts

      - name: Update llms.txt Last Updated date
        run: sed -i "s/^## Last Updated.*/## Last Updated/" public/llms.txt && sed -i "/^## Last Updated$/a $(date -u +%Y-%m-%d)" public/llms.txt

      - name: Commit scraped data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/scraped/ public/llms.txt
          git diff --staged --quiet || git commit -m "chore: update scraped provider data [$(date -u +%Y-%m-%dT%H:%M)]"
          # Prefer freshly-scraped output over divergent main (e.g. manual scrapes).
          git pull --rebase -X theirs
          git push

      - name: Trigger Vercel deploy
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -s -X POST "$VERCEL_DEPLOY_HOOK"
            echo "→ Deploy hook triggered"
          else
            echo "→ No deploy hook configured, skipping"
          fi
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        continue-on-error: true

      - name: Ping IndexNow (Bing)
        run: npx tsx scripts/ping-indexnow.ts
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        continue-on-error: true

  # Trustpilot moved to its own workflow (.github/workflows/scrape-reviews.yml)
  # at 06:00 UTC — it needs Playwright (AWS WAF JS challenge) and we want to
  # stagger commits to avoid git-push races with the fast and browser batches.
