name: Scrape Provider Data (Fast - API)

on:
  schedule:
    # Every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-api:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Scrape OFX (direct API)
        run: npx tsx scripts/scrape-ofx.ts
        timeout-minutes: 8
        continue-on-error: true

      - name: Scrape Instarem (direct API)
        run: npx tsx scripts/scrape-instarem.ts
        timeout-minutes: 5
        continue-on-error: true

      - name: Scrape XE mid-market rates
        run: npx tsx scripts/scrape-xe.ts
        timeout-minutes: 5
        continue-on-error: true

      - name: Scrape TapTap Send (API)
        run: npx tsx scripts/scrape-taptapsend.ts
        timeout-minutes: 5
        continue-on-error: true

      - name: Scrape Wise Direct (API)
        run: npx tsx scripts/scrape-wise-direct.ts
        timeout-minutes: 8
        continue-on-error: true

      - name: Scrape Wise Comparison — all providers (API)
        run: npx tsx scripts/scrape-wise-comparison.ts
        timeout-minutes: 10
        continue-on-error: true

      - name: Scrape Exiap / TheCurrencyShop (Cheerio JSON-LD)
        run: npx tsx scripts/scrape-exiap.ts
        timeout-minutes: 8
        continue-on-error: true

      # ACE Money Transfer scraper disabled — site returns 403 (bot protection added March 2026)
      # - name: Scrape ACE Money Transfer (HTML)
      #   run: npx tsx scripts/scrape-ace.ts
      #   timeout-minutes: 5
      #   continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Aggregate historical data
        run: npx tsx scripts/aggregate-history.ts

      - name: Commit scraped data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/scraped/
          git diff --staged --quiet || git commit -m "chore: update scraped provider data [$(date -u +%Y-%m-%dT%H:%M)]"
          git pull --rebase
          git push

      - name: Ping IndexNow (Bing)
        run: npx tsx scripts/ping-indexnow.ts
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        continue-on-error: true

  scrape-reviews:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Scrape Trustpilot reviews
        run: npx tsx scripts/scrape-reviews.ts
        continue-on-error: true

      - name: Commit review data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/scraped/trustpilot-ratings.json
          git diff --staged --quiet || git commit -m "chore: update Trustpilot ratings [$(date -u +%Y-%m-%d)]"
          git pull --rebase
          git push
