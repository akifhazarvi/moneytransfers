name: Scrape Provider Data

on:
  schedule:
    # All scrapers: once daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  scrape-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Scrape provider quotes (Wise Comparison API)
        run: npx tsx scripts/scrape-providers.ts
        timeout-minutes: 5
        continue-on-error: true

      - name: Scrape OFX (direct API)
        run: npx tsx scripts/scrape-ofx.ts
        timeout-minutes: 3
        continue-on-error: true

      - name: Scrape Instarem (direct API)
        run: npx tsx scripts/scrape-instarem.ts
        timeout-minutes: 3
        continue-on-error: true

      - name: Scrape XE mid-market rates
        run: npx tsx scripts/scrape-xe.ts
        timeout-minutes: 3
        continue-on-error: true

      - name: Scrape TapTap Send (API)
        run: npx tsx scripts/scrape-taptapsend.ts
        timeout-minutes: 3
        continue-on-error: true

      - name: Scrape Wise Direct (API)
        run: npx tsx scripts/scrape-wise-direct.ts
        timeout-minutes: 5
        continue-on-error: true

      - name: Scrape ExchangeRates.org.uk (fetch + Cheerio)
        run: npx tsx scripts/scrape-exchangerates.ts
        timeout-minutes: 5
        continue-on-error: true

      - name: Upload scraped data
        uses: actions/upload-artifact@v4
        with:
          name: scraped-api
          path: src/data/scraped/
          retention-days: 1

  scrape-monito:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Scrape Monito comparison (Playwright)
        run: npx tsx scripts/scrape-monito.ts
        timeout-minutes: 20
        continue-on-error: true

      - name: Upload scraped data
        uses: actions/upload-artifact@v4
        with:
          name: scraped-monito
          path: src/data/scraped/
          retention-days: 1

  scrape-browsers-1:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Scrape WorldRemit (browser)
        run: npx tsx scripts/scrape-worldremit.ts
        timeout-minutes: 15
        continue-on-error: true

      - name: Scrape Remitly (browser)
        run: npx tsx scripts/scrape-remitly.ts
        timeout-minutes: 15
        continue-on-error: true

      - name: Scrape Western Union (browser)
        run: npx tsx scripts/scrape-western-union.ts
        timeout-minutes: 15
        continue-on-error: true

      - name: Upload scraped data
        uses: actions/upload-artifact@v4
        with:
          name: scraped-browsers-1
          path: src/data/scraped/
          retention-days: 1

  scrape-browsers-2:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Scrape Revolut (browser)
        run: npx tsx scripts/scrape-revolut.ts
        timeout-minutes: 15
        continue-on-error: true

      - name: Scrape Xoom/PayPal (browser)
        run: npx tsx scripts/scrape-xoom.ts
        timeout-minutes: 15
        continue-on-error: true

      - name: Scrape Ria Money Transfer (browser)
        run: npx tsx scripts/scrape-ria.ts
        timeout-minutes: 15
        continue-on-error: true

      - name: Upload scraped data
        uses: actions/upload-artifact@v4
        with:
          name: scraped-browsers-2
          path: src/data/scraped/
          retention-days: 1

  scrape-browsers-3:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Scrape XE Money Transfer (browser)
        run: npx tsx scripts/scrape-xe-transfer.ts
        timeout-minutes: 15
        continue-on-error: true

      - name: Upload scraped data
        uses: actions/upload-artifact@v4
        with:
          name: scraped-browsers-3
          path: src/data/scraped/
          retention-days: 1

  commit-data:
    runs-on: ubuntu-latest
    needs: [scrape-api, scrape-monito, scrape-browsers-1, scrape-browsers-2, scrape-browsers-3]
    if: always()
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Download API scraper results
        uses: actions/download-artifact@v4
        with:
          name: scraped-api
          path: src/data/scraped/
        continue-on-error: true

      - name: Download Monito scraper results
        uses: actions/download-artifact@v4
        with:
          name: scraped-monito
          path: src/data/scraped/
        continue-on-error: true

      - name: Download browser scraper results (batch 1)
        uses: actions/download-artifact@v4
        with:
          name: scraped-browsers-1
          path: src/data/scraped/
        continue-on-error: true

      - name: Download browser scraper results (batch 2)
        uses: actions/download-artifact@v4
        with:
          name: scraped-browsers-2
          path: src/data/scraped/
        continue-on-error: true

      - name: Download browser scraper results (batch 3)
        uses: actions/download-artifact@v4
        with:
          name: scraped-browsers-3
          path: src/data/scraped/
        continue-on-error: true

      - name: Commit scraped data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/scraped/
          git diff --staged --quiet || git commit -m "chore: update scraped provider data [$(date -u +%Y-%m-%dT%H:%M)]"
          git pull --rebase
          git push

  scrape-reviews:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Scrape Trustpilot reviews
        run: npx tsx scripts/scrape-reviews.ts
        continue-on-error: true

      - name: Commit review data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/scraped/trustpilot-ratings.json
          git diff --staged --quiet || git commit -m "chore: update Trustpilot ratings [$(date -u +%Y-%m-%d)]"
          git pull --rebase
          git push
