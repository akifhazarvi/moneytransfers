name: Scrape Provider Data

on:
  schedule:
    # All scrapers: once daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  scrape-api:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Scrape OFX (direct API)
        run: npx tsx scripts/scrape-ofx.ts
        timeout-minutes: 8
        continue-on-error: true

      - name: Scrape Instarem (direct API)
        run: npx tsx scripts/scrape-instarem.ts
        timeout-minutes: 5
        continue-on-error: true

      - name: Scrape XE mid-market rates
        run: npx tsx scripts/scrape-xe.ts
        timeout-minutes: 5
        continue-on-error: true

      - name: Scrape TapTap Send (API)
        run: npx tsx scripts/scrape-taptapsend.ts
        timeout-minutes: 5
        continue-on-error: true

      - name: Scrape Wise Direct (API)
        run: npx tsx scripts/scrape-wise-direct.ts
        timeout-minutes: 8
        continue-on-error: true

      - name: Scrape ACE Money Transfer (HTML)
        run: npx tsx scripts/scrape-ace.ts
        timeout-minutes: 5
        continue-on-error: true

      - name: Upload scraped data
        uses: actions/upload-artifact@v4
        with:
          name: scraped-api
          path: src/data/scraped/
          retention-days: 1

  scrape-monito:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Scrape Monito comparison (Playwright)
        run: npx tsx scripts/scrape-monito.ts
        timeout-minutes: 28
        continue-on-error: true

      - name: Upload scraped data
        uses: actions/upload-artifact@v4
        with:
          name: scraped-monito
          path: src/data/scraped/
          retention-days: 1

  scrape-browsers:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Scrape Xoom/PayPal (browser)
        run: npx tsx scripts/scrape-xoom.ts
        timeout-minutes: 20
        continue-on-error: true

      - name: Upload scraped data
        uses: actions/upload-artifact@v4
        with:
          name: scraped-browsers
          path: src/data/scraped/
          retention-days: 1

  commit-data:
    runs-on: ubuntu-latest
    needs: [scrape-api, scrape-monito, scrape-browsers]
    if: always()
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Download API scraper results
        uses: actions/download-artifact@v4
        with:
          name: scraped-api
          path: src/data/scraped/
        continue-on-error: true

      - name: Download Monito scraper results
        uses: actions/download-artifact@v4
        with:
          name: scraped-monito
          path: src/data/scraped/
        continue-on-error: true

      - name: Download browser scraper results
        uses: actions/download-artifact@v4
        with:
          name: scraped-browsers
          path: src/data/scraped/
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Aggregate historical data
        run: npx tsx scripts/aggregate-history.ts

      - name: Commit scraped data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/scraped/
          git diff --staged --quiet || git commit -m "chore: update scraped provider data [$(date -u +%Y-%m-%dT%H:%M)]"
          git pull --rebase
          git push

  scrape-reviews:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Scrape Trustpilot reviews
        run: npx tsx scripts/scrape-reviews.ts
        continue-on-error: true

      - name: Commit review data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/scraped/trustpilot-ratings.json
          git diff --staged --quiet || git commit -m "chore: update Trustpilot ratings [$(date -u +%Y-%m-%d)]"
          git pull --rebase
          git push
