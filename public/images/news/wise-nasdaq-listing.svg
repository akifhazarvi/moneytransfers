<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1d3f"/>
      <stop offset="100%" stop-color="#0a1124"/>
    </linearGradient>
    <linearGradient id="candleUp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34a853"/>
      <stop offset="100%" stop-color="#1e6e35"/>
    </linearGradient>
    <marker id="wiseArrow" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#9aebc7"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff0d" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
    <line x1="80" y1="300" x2="1120" y2="300"/>
  </g>

  <!-- Category tag -->
  <rect x="80" y="70" width="180" height="34" rx="17" fill="#1a73e8"/>
  <text x="170" y="93" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="1">INDUSTRY NEWS</text>

  <!-- Headline -->
  <text x="80" y="170" fill="#ffffff" font-family="system-ui" font-size="56" font-weight="700">Wise → Nasdaq</text>
  <text x="80" y="220" fill="#9eb5ff" font-family="system-ui" font-size="28" font-weight="500">Primary listing switches May 11, 2026</text>

  <!-- Date chip -->
  <rect x="780" y="128" width="340" height="100" rx="18" fill="#1a73e8" opacity="0.12" stroke="#1a73e8" stroke-width="2"/>
  <text x="950" y="170" text-anchor="middle" fill="#9eb5ff" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">LISTING DATE</text>
  <text x="950" y="210" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">MAY 11, 2026</text>

  <!-- Arrow LSE -> Nasdaq motif -->
  <g transform="translate(80, 290)">
    <rect width="200" height="70" rx="14" fill="#ffffff10" stroke="#ffffff20"/>
    <text x="100" y="32" text-anchor="middle" fill="#9aa6bf" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">SECONDARY</text>
    <text x="100" y="56" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="22" font-weight="700">LSE</text>

    <line x1="215" y1="35" x2="290" y2="35" stroke="#9aebc7" stroke-width="3" marker-end="url(#wiseArrow)"/>

    <rect x="305" width="200" height="70" rx="14" fill="url(#candleUp)"/>
    <text x="405" y="32" text-anchor="middle" fill="#bff7d6" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">PRIMARY</text>
    <text x="405" y="56" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="22" font-weight="700">NASDAQ</text>
  </g>

  <!-- Stat cards -->
  <g transform="translate(80, 410)">
    <rect width="320" height="110" rx="16" fill="#ffffff0a" stroke="#ffffff15"/>
    <text x="24" y="40" fill="#9aa6bf" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">FY26 VOLUME</text>
    <text x="24" y="86" fill="#ffffff" font-family="system-ui" font-size="38" font-weight="700">£181.7B</text>
    <text x="200" y="86" fill="#34a853" font-family="system-ui" font-size="18" font-weight="600">+25% YoY</text>
  </g>
  <g transform="translate(420, 410)">
    <rect width="320" height="110" rx="16" fill="#ffffff0a" stroke="#ffffff15"/>
    <text x="24" y="40" fill="#9aa6bf" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">ACTIVE CUSTOMERS</text>
    <text x="24" y="86" fill="#ffffff" font-family="system-ui" font-size="38" font-weight="700">18.9M</text>
    <text x="180" y="86" fill="#34a853" font-family="system-ui" font-size="18" font-weight="600">+22% YoY</text>
  </g>
  <g transform="translate(760, 410)">
    <rect width="360" height="110" rx="16" fill="#ffffff0a" stroke="#ffffff15"/>
    <text x="24" y="40" fill="#9aa6bf" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">Q4 CROSS-BORDER VOL.</text>
    <text x="24" y="86" fill="#ffffff" font-family="system-ui" font-size="38" font-weight="700">£49.4B</text>
    <text x="200" y="86" fill="#34a853" font-family="system-ui" font-size="18" font-weight="600">+26% YoY</text>
  </g>

  <!-- Brand -->
  <text x="600" y="600" text-anchor="middle" fill="#1a73e8" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
