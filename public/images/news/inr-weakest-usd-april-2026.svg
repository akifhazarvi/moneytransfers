<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c1410"/>
      <stop offset="100%" stop-color="#150806"/>
    </linearGradient>
    <linearGradient id="rupeeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <marker id="inrArrow" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#f97316"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
    <line x1="80" y1="300" x2="1120" y2="300"/>
  </g>

  <!-- Tag with India flag -->
  <g transform="translate(80, 70)">
    <rect width="230" height="34" rx="17" fill="#ffffff12"/>
    <rect x="8" y="4" width="26" height="9" rx="2" fill="#ff9933"/>
    <rect x="8" y="13" width="26" height="9" rx="1" fill="#ffffff"/>
    <rect x="8" y="22" width="26" height="9" rx="2" fill="#138808"/>
    <circle cx="21" cy="17" r="3" fill="none" stroke="#000080" stroke-width="0.8"/>
    <text x="140" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1">INDIA / FX MARKETS</text>
  </g>

  <!-- Headline -->
  <text x="80" y="170" fill="#ffffff" font-family="system-ui" font-size="48" font-weight="700">Rupee at a 1-year low</text>
  <text x="80" y="215" fill="#fbbf24" font-family="system-ui" font-size="26" font-weight="500">Send money to India — now or wait?</text>

  <!-- Huge number card -->
  <g transform="translate(640, 130)">
    <rect x="0" y="0" width="480" height="220" rx="24" fill="#f59e0b12" stroke="#f59e0b" stroke-width="2"/>
    <text x="240" y="60" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">USD / INR  —  APR 20, 2026</text>
    <text x="240" y="160" text-anchor="middle" fill="url(#rupeeGrad)" font-family="system-ui" font-size="104" font-weight="800">₹92.98</text>
    <g transform="translate(160, 180)">
      <rect width="160" height="28" rx="14" fill="#c2410c"/>
      <text x="80" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">▼ 9.18% YoY</text>
    </g>
  </g>

  <!-- Downward trend line -->
  <polyline points="80,300 200,320 320,345 440,380 560,430" fill="none" stroke="#f97316" stroke-width="4" stroke-linecap="round" marker-end="url(#inrArrow)"/>
  <circle cx="80" cy="300" r="6" fill="#f97316"/>
  <circle cx="200" cy="320" r="6" fill="#f97316"/>
  <circle cx="320" cy="345" r="6" fill="#f97316"/>
  <circle cx="440" cy="380" r="6" fill="#f97316"/>
  <text x="80" y="285" fill="#fbbf24" font-family="system-ui" font-size="13" font-weight="600">APR 2025</text>
  <text x="560" y="415" fill="#fbbf24" font-family="system-ui" font-size="13" font-weight="600">APR 2026</text>

  <!-- Stat cards -->
  <g transform="translate(80, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#9aa6bf" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">GBP / INR</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="34" font-weight="700">₹126.04</text>
  </g>
  <g transform="translate(420, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#9aa6bf" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">1-MONTH RANGE</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="28" font-weight="700">92.41 – 94.62</text>
  </g>
  <g transform="translate(760, 480)">
    <rect width="360" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#9aa6bf" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">EXTRA ₹ VS APR 2025</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="34" font-weight="700">+₹7,800 / $1k</text>
  </g>

  <!-- Brand -->
  <text x="600" y="605" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
