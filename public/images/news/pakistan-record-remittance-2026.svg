<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b2821"/>
      <stop offset="100%" stop-color="#051711"/>
    </linearGradient>
    <linearGradient id="bigNum" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <marker id="pkArrow" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#34d399"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
    <line x1="80" y1="300" x2="1120" y2="300"/>
  </g>

  <!-- Tag with Pakistan flag -->
  <g transform="translate(80, 70)">
    <rect width="220" height="34" rx="17" fill="#01411C"/>
    <rect width="44" height="34" rx="17" fill="#ffffff"/>
    <circle cx="22" cy="17" r="9" fill="#01411C"/>
    <circle cx="26" cy="14" r="7" fill="#ffffff"/>
    <text x="130" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="1">PAKISTAN REMITTANCES</text>
  </g>

  <!-- Headline -->
  <text x="80" y="170" fill="#ffffff" font-family="system-ui" font-size="48" font-weight="700">Record remittance year</text>
  <text x="80" y="215" fill="#86efac" font-family="system-ui" font-size="26" font-weight="500">UK senders drive GBP→PKR corridor to new highs</text>

  <!-- Huge number -->
  <g transform="translate(640, 130)">
    <rect x="0" y="0" width="480" height="220" rx="24" fill="#34d39915" stroke="#34d399" stroke-width="2"/>
    <text x="240" y="60" text-anchor="middle" fill="#86efac" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">PROJECTED FY26 INFLOW</text>
    <text x="240" y="160" text-anchor="middle" fill="url(#bigNum)" font-family="system-ui" font-size="112" font-weight="800">$41B</text>
    <text x="240" y="200" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="18" font-weight="500">up from $38B in 2025</text>
  </g>

  <!-- Trend line motif -->
  <polyline points="80,450 200,420 320,390 440,350 560,300" fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round" marker-end="url(#pkArrow)"/>
  <circle cx="80" cy="450" r="6" fill="#34d399"/>
  <circle cx="200" cy="420" r="6" fill="#34d399"/>
  <circle cx="320" cy="390" r="6" fill="#34d399"/>
  <circle cx="440" cy="350" r="6" fill="#34d399"/>

  <!-- Stat cards -->
  <g transform="translate(80, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#9aa6bf" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">UK → PAKISTAN (FEB 2026)</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="34" font-weight="700">$532M</text>
  </g>
  <g transform="translate(420, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#9aa6bf" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">GBP → PKR RATE</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="34" font-weight="700">377 PKR</text>
  </g>
  <g transform="translate(760, 480)">
    <rect width="360" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#9aa6bf" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">SAVE VS UK BANK</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="34" font-weight="700">£500–£800/yr</text>
  </g>

  <!-- Brand -->
  <text x="600" y="605" text-anchor="middle" fill="#34d399" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
