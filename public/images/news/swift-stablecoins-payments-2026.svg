<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <!-- Speed comparison bars -->
  <!-- 2020: 3-5 days -->
  <text x="100" y="195" fill="#ffffff80" font-family="system-ui" font-size="14" font-weight="600">2020</text>
  <rect x="180" y="175" width="800" height="35" rx="6" fill="#e53935" opacity="0.7"/>
  <text x="590" y="200" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="600">3–5 business days (average bank wire)</text>
  <!-- 2024: hours to 1 day -->
  <text x="100" y="255" fill="#ffffff80" font-family="system-ui" font-size="14" font-weight="600">2024</text>
  <rect x="180" y="235" width="400" height="35" rx="6" fill="#ff9800" opacity="0.7"/>
  <text x="380" y="260" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="600">Hours to 1 day (specialist providers)</text>
  <!-- 2026: 10 minutes -->
  <text x="100" y="315" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="700">2026</text>
  <rect x="180" y="295" width="160" height="35" rx="6" fill="#1a73e8" opacity="0.9"/>
  <text x="260" y="320" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="600">10 min (75%)</text>
  <!-- Stablecoins: seconds -->
  <text x="100" y="375" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="700">Stablecoin</text>
  <rect x="180" y="355" width="60" height="35" rx="6" fill="#00c853" opacity="0.9"/>
  <text x="210" y="380" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="600">Sec</text>
  <!-- Right side stats -->
  <rect x="750" y="240" width="380" height="200" rx="16" fill="#ffffff08" stroke="#ffffff15" stroke-width="1"/>
  <text x="940" y="280" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="18" font-weight="700">Key Numbers</text>
  <g fill="#ffffff" font-family="system-ui" text-anchor="start">
    <text x="790" y="315" font-size="15"><tspan fill="#1a73e8" font-weight="700">75%</tspan> of SWIFT payments in 10 min</text>
    <text x="790" y="345" font-size="15"><tspan fill="#00c853" font-weight="700">500M</tspan> stablecoin wallets connected</text>
    <text x="790" y="375" font-size="15"><tspan fill="#ff9800" font-weight="700">11,500</tspan> banks on SWIFT network</text>
    <text x="790" y="405" font-size="15"><tspan fill="#e53935" font-weight="700">$0.01</tspan> avg stablecoin transfer fee</text>
  </g>
  <!-- Title -->
  <text x="600" y="65" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="28" font-weight="700">The Speed Revolution in Cross-Border Payments</text>
  <text x="600" y="100" text-anchor="middle" fill="#ffffff80" font-family="system-ui" font-size="17">How long it takes to send money abroad: 2020 vs 2026</text>
  <!-- Axis label -->
  <text x="600" y="460" text-anchor="middle" fill="#ffffff50" font-family="system-ui" font-size="13">Bar length represents relative time to delivery</text>
  <!-- Footer -->
  <text x="600" y="555" text-anchor="middle" fill="#ffffff60" font-family="system-ui" font-size="14">Sources: FSB Cross-Border Payments Summit, Thunes, PYMNTS.com | March 2026</text>
  <text x="600" y="590" text-anchor="middle" fill="#1a73e8" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
