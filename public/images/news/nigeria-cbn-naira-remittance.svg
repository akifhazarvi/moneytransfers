<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a4d27"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Nigerian flag stripes -->
  <rect x="80" y="160" width="60" height="300" rx="6" fill="#008751" opacity="0.6"/>
  <rect x="140" y="160" width="60" height="300" rx="0" fill="#ffffff" opacity="0.3"/>
  <rect x="200" y="160" width="60" height="300" rx="6" fill="#008751" opacity="0.6"/>
  <!-- Arrow flow: USD -> NGN -->
  <text x="400" y="280" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="52" font-weight="700">USD</text>
  <text x="400" y="330" text-anchor="middle" fill="#ffffff60" font-family="system-ui" font-size="18">GBP / EUR / CAD</text>
  <!-- Arrow -->
  <path d="M 520 290 L 680 290" stroke="#ff9800" stroke-width="4" fill="none" stroke-dasharray="12,6"/>
  <polygon points="680,280 700,290 680,300" fill="#ff9800"/>
  <!-- CBN box -->
  <rect x="720" y="230" width="200" height="120" rx="12" fill="#ffffff15" stroke="#ffffff30" stroke-width="2"/>
  <text x="820" y="275" text-anchor="middle" fill="#ff9800" font-family="system-ui" font-size="16" font-weight="600">CBN CONVERTS</text>
  <text x="820" y="310" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="42" font-weight="700">NGN</text>
  <text x="820" y="340" text-anchor="middle" fill="#ffffff60" font-family="system-ui" font-size="14">Naira only from May 1</text>
  <!-- Deadline badge -->
  <rect x="960" y="250" width="160" height="60" rx="30" fill="#ff3d00" opacity="0.9"/>
  <text x="1040" y="287" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="18" font-weight="700">May 1, 2026</text>
  <!-- Title -->
  <text x="600" y="70" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="30" font-weight="700">Nigeria: All Remittances Must Settle in Naira</text>
  <text x="600" y="108" text-anchor="middle" fill="#ffffff80" font-family="system-ui" font-size="18">CBN directive to IMTOs | Dollar payouts ending | Deadline: May 1, 2026</text>
  <!-- Stats row -->
  <g transform="translate(0, 400)">
    <rect x="150" y="30" width="240" height="80" rx="10" fill="#ffffff10"/>
    <text x="270" y="65" text-anchor="middle" fill="#ff9800" font-family="system-ui" font-size="28" font-weight="700">$20B+</text>
    <text x="270" y="90" text-anchor="middle" fill="#ffffff60" font-family="system-ui" font-size="14">Annual remittances to Nigeria</text>
    <rect x="480" y="30" width="240" height="80" rx="10" fill="#ffffff10"/>
    <text x="600" y="65" text-anchor="middle" fill="#ff9800" font-family="system-ui" font-size="28" font-weight="700">$1B/mo</text>
    <text x="600" y="90" text-anchor="middle" fill="#ffffff60" font-family="system-ui" font-size="14">CBN target by end of 2026</text>
    <rect x="810" y="30" width="240" height="80" rx="10" fill="#ffffff10"/>
    <text x="930" y="65" text-anchor="middle" fill="#ff9800" font-family="system-ui" font-size="28" font-weight="700">10-15%</text>
    <text x="930" y="90" text-anchor="middle" fill="#ffffff60" font-family="system-ui" font-size="14">Potential rate gap risk</text>
  </g>
  <!-- Footer -->
  <text x="600" y="560" text-anchor="middle" fill="#ffffff60" font-family="system-ui" font-size="14">Source: Central Bank of Nigeria, March 24, 2026</text>
  <text x="600" y="590" text-anchor="middle" fill="#1a73e8" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>