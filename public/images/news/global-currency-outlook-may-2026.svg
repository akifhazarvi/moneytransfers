<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e3f"/>
      <stop offset="100%" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="dxyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="trendGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <marker id="trendArrow" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#60a5fa"/>
    </marker>
    <radialGradient id="globe" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#1d4ed8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0b1e3f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Soft globe glow behind headline -->
  <circle cx="320" cy="340" r="260" fill="url(#globe)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
    <line x1="80" y1="300" x2="1120" y2="300"/>
  </g>

  <!-- Tag -->
  <g transform="translate(80, 70)">
    <rect width="280" height="34" rx="17" fill="#ffffff12"/>
    <circle cx="22" cy="17" r="9" fill="none" stroke="#60a5fa" stroke-width="1.6"/>
    <path d="M13 17 Q 22 7 31 17 Q 22 27 13 17 Z" fill="none" stroke="#60a5fa" stroke-width="1.2"/>
    <line x1="22" y1="8" x2="22" y2="26" stroke="#60a5fa" stroke-width="1.2"/>
    <text x="160" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">GLOBAL FX OUTLOOK / MAY 2026</text>
  </g>

  <!-- Headline -->
  <text x="80" y="170" fill="#ffffff" font-family="system-ui" font-size="46" font-weight="700">The dollar peak is behind us</text>
  <text x="80" y="215" fill="#93c5fd" font-family="system-ui" font-size="24" font-weight="500">USD, EUR, GBP &amp; what it means for your transfer</text>

  <!-- DXY card -->
  <g transform="translate(640, 130)">
    <rect x="0" y="0" width="480" height="220" rx="24" fill="#60a5fa12" stroke="#60a5fa" stroke-width="2"/>
    <text x="240" y="60" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">DXY (US DOLLAR INDEX)  —  MAY 2026</text>
    <text x="240" y="160" text-anchor="middle" fill="url(#dxyGrad)" font-family="system-ui" font-size="104" font-weight="800">97.7</text>
    <g transform="translate(160, 180)">
      <rect width="160" height="28" rx="14" fill="#1d4ed8"/>
      <text x="80" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">▼ Lowest since Feb</text>
    </g>
  </g>

  <!-- Downward trend line (DXY softening) -->
  <polyline points="80,295 200,310 320,335 440,365 560,400" fill="none" stroke="url(#trendGrad)" stroke-width="4" stroke-linecap="round" marker-end="url(#trendArrow)"/>
  <circle cx="80" cy="295" r="6" fill="#34d399"/>
  <circle cx="200" cy="310" r="6" fill="#5eead4"/>
  <circle cx="320" cy="335" r="6" fill="#60a5fa"/>
  <circle cx="440" cy="365" r="6" fill="#60a5fa"/>
  <text x="80" y="280" fill="#93c5fd" font-family="system-ui" font-size="13" font-weight="600">APR PEAK</text>
  <text x="560" y="385" fill="#93c5fd" font-family="system-ui" font-size="13" font-weight="600">MAY 16</text>

  <!-- Three stat cards: EUR, GBP, JPY -->
  <g transform="translate(80, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">EUR / USD</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="34" font-weight="700">1.1733</text>
    <text x="200" y="72" fill="#34d399" font-family="system-ui" font-size="16" font-weight="600">▲ Recovering</text>
  </g>
  <g transform="translate(420, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">GBP / USD</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="34" font-weight="700">1.3578</text>
    <text x="200" y="72" fill="#fbbf24" font-family="system-ui" font-size="16" font-weight="600">↔ Range</text>
  </g>
  <g transform="translate(760, 480)">
    <rect width="360" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">USD / JPY  ·  CENTRAL BANK TRIO</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="28" font-weight="700">156.66  ·  Jun 11–18</text>
  </g>

  <!-- Brand -->
  <text x="600" y="605" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
