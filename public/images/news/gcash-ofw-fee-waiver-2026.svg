<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#004d40"/>
      <stop offset="100%" stop-color="#00251a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <!-- Central zero badge -->
  <circle cx="600" cy="280" r="120" fill="#00c853" opacity="0.15"/>
  <circle cx="600" cy="280" r="90" fill="#00c853" opacity="0.25"/>
  <text x="600" y="270" text-anchor="middle" fill="#00c853" font-family="system-ui" font-size="72" font-weight="800">$0</text>
  <text x="600" y="310" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="20" font-weight="600">TRANSFER FEES</text>
  <text x="600" y="340" text-anchor="middle" fill="#ffffff80" font-family="system-ui" font-size="16">Through March 31, 2026</text>
  <!-- Country flags/labels around the circle -->
  <g fill="#ffffff" font-family="system-ui" font-size="16">
    <text x="320" y="200" text-anchor="middle" font-weight="600">UAE</text>
    <text x="320" y="220" text-anchor="middle" fill="#ffffff80" font-size="13">AED → PHP</text>
    <text x="320" y="350" text-anchor="middle" font-weight="600">Saudi Arabia</text>
    <text x="320" y="370" text-anchor="middle" fill="#ffffff80" font-size="13">SAR → PHP</text>
    <text x="880" y="200" text-anchor="middle" font-weight="600">Qatar</text>
    <text x="880" y="220" text-anchor="middle" fill="#ffffff80" font-size="13">QAR → PHP</text>
    <text x="880" y="350" text-anchor="middle" font-weight="600">Oman</text>
    <text x="880" y="370" text-anchor="middle" fill="#ffffff80" font-size="13">OMR → PHP</text>
  </g>
  <!-- Connecting lines -->
  <g stroke="#00c853" stroke-width="1.5" opacity="0.4">
    <line x1="380" y1="210" x2="510" y2="260"/>
    <line x1="380" y1="360" x2="510" y2="300"/>
    <line x1="820" y1="210" x2="690" y2="260"/>
    <line x1="820" y1="360" x2="690" y2="300"/>
  </g>
  <!-- Stats bar at bottom -->
  <rect x="100" y="440" width="1000" height="80" rx="12" fill="#ffffff10"/>
  <g fill="#ffffff" font-family="system-ui" text-anchor="middle">
    <text x="270" y="470" font-size="28" font-weight="700">10M+</text>
    <text x="270" y="500" font-size="13" fill="#ffffff80">OFWs worldwide</text>
    <text x="500" y="470" font-size="28" font-weight="700">$40B+</text>
    <text x="500" y="500" font-size="13" fill="#ffffff80">Annual remittances</text>
    <text x="730" y="470" font-size="28" font-weight="700">90M</text>
    <text x="730" y="500" font-size="13" fill="#ffffff80">GCash users</text>
    <text x="930" y="470" font-size="28" font-weight="700">HR 905</text>
    <text x="930" y="500" font-size="13" fill="#ffffff80">Congress resolution</text>
  </g>
  <!-- Title -->
  <text x="600" y="70" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="28" font-weight="700">GCash Drops All Fees for OFW Transfers to the Middle East</text>
  <text x="600" y="105" text-anchor="middle" fill="#ffffff80" font-family="system-ui" font-size="17">Philippine Congress pushes sector-wide fee waiver</text>
  <!-- Footer -->
  <text x="600" y="575" text-anchor="middle" fill="#ffffff60" font-family="system-ui" font-size="14">Sources: GCash, FintechNews.ph, Manila Bulletin | March 18, 2026</text>
  <text x="600" y="605" text-anchor="middle" fill="#00c853" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
