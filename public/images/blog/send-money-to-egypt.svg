<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c3a5e"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8922a"/>
      <stop offset="100%" stop-color="#a06820"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6db5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2a6db5" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle sky glow -->
  <ellipse cx="600" cy="200" rx="500" ry="180" fill="url(#sky)"/>

  <!-- Desert ground -->
  <rect x="0" y="480" width="1200" height="150" fill="#7a4f1a" opacity="0.5"/>
  <rect x="0" y="500" width="1200" height="130" fill="#5a3810" opacity="0.4"/>

  <!-- Large pyramid (centre) -->
  <polygon points="600,180 800,480 400,480" fill="url(#sand)" opacity="0.9"/>
  <polygon points="600,180 700,480 600,480" fill="#a06820" opacity="0.4"/>

  <!-- Small left pyramid -->
  <polygon points="320,310 440,480 200,480" fill="#c8922a" opacity="0.65"/>

  <!-- Small right pyramid -->
  <polygon points="880,330 980,480 780,480" fill="#c8922a" opacity="0.65"/>

  <!-- Stars -->
  <circle cx="120" cy="80" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="200" cy="55" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="340" cy="40" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="480" cy="70" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="720" cy="50" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="900" cy="65" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="1050" cy="45" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="1150" cy="90" r="1.5" fill="#ffffff" opacity="0.5"/>

  <!-- Crescent moon (Egypt reference) -->
  <path d="M1080 100 A40 40 0 1 1 1080 180 A28 28 0 1 0 1080 100" fill="#f4c542" opacity="0.9"/>

  <!-- Title text -->
  <text x="600" y="560" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="38" font-weight="700">Send Money to Egypt</text>
  <text x="600" y="600" text-anchor="middle" fill="#f4c542" font-family="system-ui,sans-serif" font-size="20">EGP · Egyptian Pound · Compare live rates</text>

  <!-- Brand -->
  <text x="600" y="625" text-anchor="middle" fill="#ffffff40" font-family="system-ui,sans-serif" font-size="13" font-weight="500">sendmoneycompare.com</text>
</svg>
