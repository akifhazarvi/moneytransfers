<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#240a0b"/>
      <stop offset="100%" stop-color="#100404"/>
    </linearGradient>
    <linearGradient id="vnd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#da251d"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.35" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#100404" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="360" r="260" fill="url(#globe)"/>

  <!-- Yellow star on red badge -->
  <g transform="translate(1040, 90)" opacity="0.85">
    <rect width="120" height="80" rx="6" fill="#da251d"/>
    <polygon points="60,18 70,42 96,42 75,58 84,82 60,68 36,82 45,58 24,42 50,42" fill="#fde047"/>
  </g>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
  </g>

  <g transform="translate(80, 70)">
    <rect width="240" height="34" rx="17" fill="#da251d"/>
    <text x="120" y="23" text-anchor="middle" fill="#fde047" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">VIETNAM · VND GUIDE</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="46" font-weight="700">Send Money to Vietnam</text>
