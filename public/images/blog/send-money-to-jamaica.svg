<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#006994"/>
      <stop offset="60%" stop-color="#00527a"/>
      <stop offset="100%" stop-color="#004a6a"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0099cc"/>
      <stop offset="100%" stop-color="#007ab3"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d87a"/>
      <stop offset="100%" stop-color="#ddb84a"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a5230"/>
      <stop offset="100%" stop-color="#5c3a1e"/>
    </linearGradient>
  </defs>
  <!-- Sky background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Sea -->
  <rect x="0" y="350" width="1200" height="160" fill="url(#sea)" opacity="0.85"/>
  <!-- Wave highlights -->
  <ellipse cx="300" cy="355" rx="200" ry="12" fill="#40b8e0" opacity="0.35"/>
  <ellipse cx="900" cy="362" rx="250" ry="10" fill="#40b8e0" opacity="0.3"/>

  <!-- Sandy beach -->
  <rect x="0" y="490" width="1200" height="140" fill="url(#sand)"/>
  <!-- Beach shadow -->
  <rect x="0" y="490" width="1200" height="20" fill="#c9a030" opacity="0.5"/>

  <!-- Sun -->
  <circle cx="920" cy="130" r="65" fill="#fed100" opacity="0.92"/>
  <circle cx="920" cy="130" r="85" fill="#fed100" opacity="0.15"/>
  <!-- Sun rays -->
  <line x1="920" y1="30" x2="920" y2="10" stroke="#fed100" stroke-width="3" opacity="0.5"/>
  <line x1="999" y1="51" x2="1014" y2="36" stroke="#fed100" stroke-width="3" opacity="0.5"/>
  <line x1="1040" y1="130" x2="1060" y2="130" stroke="#fed100" stroke-width="3" opacity="0.5"/>
  <line x1="999" y1="209" x2="1014" y2="224" stroke="#fed100" stroke-width="3" opacity="0.5"/>
  <line x1="841" y1="51" x2="826" y2="36" stroke="#fed100" stroke-width="3" opacity="0.5"/>
  <line x1="800" y1="130" x2="780" y2="130" stroke="#fed100" stroke-width="3" opacity="0.5"/>

  <!-- Palm tree (left) -->
  <rect x="198" y="280" width="24" height="220" rx="8" fill="url(#trunk)" transform="rotate(-6,210,490)"/>
  <!-- Fronds left palm -->
  <ellipse cx="170" cy="270" rx="90" ry="18" fill="#1a7a2a" opacity="0.9" transform="rotate(-30,170,270)"/>
  <ellipse cx="210" cy="255" rx="90" ry="18" fill="#1f9933" opacity="0.85" transform="rotate(-5,210,255)"/>
  <ellipse cx="250" cy="265" rx="90" ry="18" fill="#1a7a2a" opacity="0.9" transform="rotate(25,250,265)"/>
  <ellipse cx="200" cy="248" rx="70" ry="15" fill="#25b53d" opacity="0.8" transform="rotate(-60,200,248)"/>
  <ellipse cx="225" cy="245" rx="70" ry="15" fill="#25b53d" opacity="0.8" transform="rotate(55,225,245)"/>
  <!-- Coconuts -->
  <circle cx="206" cy="285" r="10" fill="#8B6914"/>
  <circle cx="220" cy="282" r="9" fill="#7a5c10"/>

  <!-- Palm tree (right) -->
  <rect x="978" y="300" width="22" height="200" rx="8" fill="url(#trunk)" transform="rotate(5,989,490)"/>
  <!-- Fronds right palm -->
  <ellipse cx="950" cy="288" rx="85" ry="17" fill="#1a7a2a" opacity="0.9" transform="rotate(-25,950,288)"/>
  <ellipse cx="990" cy="275" rx="85" ry="17" fill="#1f9933" opacity="0.85" transform="rotate(0,990,275)"/>
  <ellipse cx="1028" cy="285" rx="85" ry="17" fill="#1a7a2a" opacity="0.9" transform="rotate(28,1028,285)"/>
  <ellipse cx="978" cy="268" rx="65" ry="14" fill="#25b53d" opacity="0.8" transform="rotate(-55,978,268)"/>
  <ellipse cx="1002" cy="265" rx="65" ry="14" fill="#25b53d" opacity="0.8" transform="rotate(50,1002,265)"/>

  <!-- Jamaica flag stripe accent (diagonal) -->
  <polygon points="0,0 120,0 0,120" fill="#009B3A" opacity="0.18"/>
  <polygon points="1200,630 1080,630 1200,510" fill="#009B3A" opacity="0.18"/>

  <!-- Title -->
  <text x="600" y="555" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="40" font-weight="700">Send Money to Jamaica</text>
  <text x="600" y="597" text-anchor="middle" fill="#fed100" font-family="system-ui,sans-serif" font-size="21">JMD · Jamaican Dollar · Compare live rates</text>

  <!-- Brand -->
  <text x="600" y="622" text-anchor="middle" fill="#ffffff50" font-family="system-ui,sans-serif" font-size="13">sendmoneycompare.com</text>
</svg>
