<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- USDT Circle -->
  <circle cx="350" cy="300" r="120" fill="#26a17b" opacity="0.9"/>
  <text x="350" y="290" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="48" font-weight="700">USDT</text>
  <text x="350" y="330" text-anchor="middle" fill="#ffffffcc" font-family="system-ui" font-size="18">Tether</text>
  <!-- USDC Circle -->
  <circle cx="600" cy="300" r="120" fill="#2775ca" opacity="0.9"/>
  <text x="600" y="290" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="48" font-weight="700">USDC</text>
  <text x="600" y="330" text-anchor="middle" fill="#ffffffcc" font-family="system-ui" font-size="18">Circle</text>
  <!-- Arrow -->
  <path d="M 740 300 L 820 300" stroke="#ffffff60" stroke-width="3" fill="none" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ffffff60"/></marker></defs>
  <!-- Local currency symbols -->
  <g transform="translate(900, 220)">
    <rect x="-60" y="-20" width="120" height="45" rx="8" fill="#ffffff15"/>
    <text x="0" y="12" text-anchor="middle" fill="#34a853" font-family="system-ui" font-size="22" font-weight="600">NGN</text>
    <rect x="-60" y="40" width="120" height="45" rx="8" fill="#ffffff15"/>
    <text x="0" y="72" text-anchor="middle" fill="#34a853" font-family="system-ui" font-size="22" font-weight="600">KES</text>
    <rect x="-60" y="100" width="120" height="45" rx="8" fill="#ffffff15"/>
    <text x="0" y="132" text-anchor="middle" fill="#34a853" font-family="system-ui" font-size="22" font-weight="600">PHP</text>
  </g>
  <!-- Stats -->
  <text x="600" y="490" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="22" font-weight="600">$11.1 Trillion in stablecoin volume (2025) — up 85% YoY</text>
  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">Stablecoin Remittances: A Beginner's Guide</text>
  <text x="600" y="95" text-anchor="middle" fill="#ffffff80" font-family="system-ui" font-size="18">USDT &amp; USDC for international transfers — costs, risks &amp; how-to</text>
  <!-- Footer -->
  <text x="600" y="590" text-anchor="middle" fill="#1a73e8" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
