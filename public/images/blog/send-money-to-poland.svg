<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e3f"/>
      <stop offset="100%" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="pln" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dc143c"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.35" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0b1e3f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="360" r="260" fill="url(#globe)"/>

  <!-- Polish flag side band -->
  <g transform="translate(1130, 0)">
    <rect width="70" height="315" fill="#ffffff"/>
    <rect y="315" width="70" height="315" fill="#dc143c"/>
  </g>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1080" y2="460"/>
    <line x1="80" y1="380" x2="1080" y2="380"/>
  </g>

  <g transform="translate(80, 70)">
    <rect width="220" height="34" rx="17" fill="#dc143c"/>
    <text x="110" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">POLAND · PLN GUIDE</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="46" font-weight="700">Send Money to Poland</text>
