    <text x="230" y="60" text-anchor="middle" fill="#fca5a5" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">USD / PLN  ·  MID-MARKET</text>
    <text x="230" y="170" text-anchor="middle" fill="url(#pln)" font-family="system-ui" font-size="100" font-weight="800">zł 3.62</text>
    <text x="230" y="205" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="18" font-weight="500">per US$1</text>
  </g>

  <g transform="translate(80, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fca5a5" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">EUR / PLN</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">zł 4.24</text>
  </g>
  <g transform="translate(420, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fca5a5" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">GBP / PLN</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">zł 4.92</text>
  </g>
  <g transform="translate(760, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fca5a5" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">FASTEST RAIL</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="26" font-weight="700">Express Elixir</text>
