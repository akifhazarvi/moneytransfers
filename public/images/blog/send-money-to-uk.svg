    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">£0.85</text>
  </g>
  <g transform="translate(420, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">FASTER PAYMENTS</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="28" font-weight="700">in seconds · 24/7</text>
