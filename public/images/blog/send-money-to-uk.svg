    <line x1="120" y1="0" x2="0" y2="80" stroke="#ffffff" stroke-width="10"/>
    <line x1="60" y1="0" x2="60" y2="80" stroke="#ffffff" stroke-width="14"/>
    <line x1="0" y1="40" x2="120" y2="40" stroke="#ffffff" stroke-width="14"/>
    <line x1="60" y1="0" x2="60" y2="80" stroke="#cf142b" stroke-width="6"/>
    <line x1="0" y1="40" x2="120" y2="40" stroke="#cf142b" stroke-width="6"/>
  </g>

  <g stroke="#ffffff0a" stroke-width="1">
