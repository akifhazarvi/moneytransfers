<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c2218"/>
      <stop offset="100%" stop-color="#040d08"/>
    </linearGradient>
    <linearGradient id="zar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#006633"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.35" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#040d08" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="360" r="260" fill="url(#globe)"/>

  <!-- SA flag inspired chevron -->
  <g transform="translate(1050, 100)" opacity="0.8">
    <polygon points="0,0 80,80 0,160" fill="#006633"/>
    <polygon points="0,0 60,80 0,160" fill="#fcd34d"/>
    <polygon points="0,0 40,80 0,160" fill="#000000"/>
  </g>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
  </g>

  <g transform="translate(80, 70)">
    <rect width="240" height="34" rx="17" fill="#006633"/>
    <text x="120" y="23" text-anchor="middle" fill="#fcd34d" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">SOUTH AFRICA · ZAR</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="44" font-weight="700">Send Money to South Africa</text>
  <text x="80" y="225" fill="#fcd34d" font-family="system-ui" font-size="24" font-weight="500">ZAR transfer guide · 2026 rates</text>

  <g transform="translate(640, 150)">
    <rect width="480" height="220" rx="24" fill="#fcd34d15" stroke="#fcd34d" stroke-width="2"/>
    <text x="240" y="60" text-anchor="middle" fill="#fcd34d" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">USD / ZAR  ·  MID-MARKET</text>
    <text x="240" y="170" text-anchor="middle" fill="url(#zar)" font-family="system-ui" font-size="100" font-weight="800">R 18.42</text>
    <text x="240" y="205" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="18" font-weight="500">per US$1</text>
  </g>

  <g transform="translate(80, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fcd34d" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">GBP / ZAR</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">R 25.01</text>
  </g>
  <g transform="translate(420, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fcd34d" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">FORWARDS LIMIT</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="28" font-weight="700">R 11M/yr (SDA)</text>
  </g>
  <g transform="translate(760, 480)">
    <rect width="360" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fcd34d" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">TOP PROVIDERS</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="26" font-weight="700">Wise · OFX · Currencies</text>
  </g>

  <text x="600" y="615" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
