<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e3f"/>
      <stop offset="100%" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="bigBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.3" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0b1e3f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="300" cy="340" r="280" fill="url(#globe)"/>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
  </g>

  <!-- Tag -->
  <g transform="translate(80, 70)">
    <rect width="240" height="34" rx="17" fill="#1d4ed8"/>
    <text x="120" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">LARGE-VALUE TRANSFERS</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="46" font-weight="700">Large International</text>
  <text x="80" y="230" fill="#ffffff" font-family="system-ui" font-size="46" font-weight="700">Transfers</text>
  <text x="80" y="275" fill="#93c5fd" font-family="system-ui" font-size="22" font-weight="500">FX brokers, banks &amp; fintech compared</text>

  <!-- Big amount card -->
  <g transform="translate(680, 130)">
    <rect width="440" height="240" rx="24" fill="#60a5fa15" stroke="#60a5fa" stroke-width="2"/>
    <text x="220" y="60" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">TRANSFER SIZE</text>
    <text x="220" y="170" text-anchor="middle" fill="url(#bigBlue)" font-family="system-ui" font-size="110" font-weight="800">$10K+</text>
    <text x="220" y="210" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="20" font-weight="500">save 1.5–3% vs banks</text>
  </g>

  <!-- Stat ladder -->
  <g transform="translate(80, 410)">
    <rect width="300" height="50" rx="10" fill="#ffffff08" stroke="#ffffff18"/>
    <text x="20" y="33" fill="#93c5fd" font-family="system-ui" font-size="13" font-weight="600">$10K – $50K</text>
    <text x="280" y="33" text-anchor="end" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="700">fintech wins</text>

    <rect y="60" width="300" height="50" rx="10" fill="#ffffff08" stroke="#ffffff18"/>
    <text x="20" y="93" fill="#93c5fd" font-family="system-ui" font-size="13" font-weight="600">$50K – $250K</text>
    <text x="280" y="93" text-anchor="end" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="700">FX broker</text>

    <rect y="120" width="300" height="50" rx="10" fill="#ffffff08" stroke="#ffffff18"/>
    <text x="20" y="153" fill="#93c5fd" font-family="system-ui" font-size="13" font-weight="600">$250K+</text>
    <text x="280" y="153" text-anchor="end" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="700">dealing desk</text>
  </g>

  <text x="600" y="605" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
