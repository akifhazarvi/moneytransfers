<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#072018"/>
      <stop offset="100%" stop-color="#020e07"/>
    </linearGradient>
    <linearGradient id="kes" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.35" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#020e07" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="360" r="260" fill="url(#globe)"/>

  <!-- Kenya flag bands -->
  <rect x="0" y="615" width="1200" height="15" fill="#000000"/>
  <rect x="0" y="615" width="400" height="15" fill="#bb0000"/>
  <rect x="800" y="615" width="400" height="15" fill="#006600"/>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
  </g>

  <g transform="translate(80, 70)">
    <rect width="220" height="34" rx="17" fill="#006600"/>
    <text x="110" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">KENYA · KES GUIDE</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="46" font-weight="700">Send Money to Kenya</text>
  <text x="80" y="225" fill="#86efac" font-family="system-ui" font-size="24" font-weight="500">KES guide · M-Pesa &amp; bank rails</text>

  <g transform="translate(640, 130)">
    <rect width="480" height="220" rx="24" fill="#22c55e15" stroke="#22c55e" stroke-width="2"/>
    <text x="240" y="60" text-anchor="middle" fill="#86efac" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">USD / KES  ·  MID-MARKET</text>
    <text x="240" y="170" text-anchor="middle" fill="url(#kes)" font-family="system-ui" font-size="100" font-weight="800">KSh 129</text>
    <text x="240" y="205" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="18" font-weight="500">per US$1</text>
  </g>

  <!-- M-Pesa style badge -->
  <g transform="translate(80, 320)">
    <rect width="240" height="50" rx="25" fill="#22c55e"/>
    <text x="120" y="32" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="18" font-weight="700">M-PESA DELIVERY</text>
  </g>

  <g transform="translate(80, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#86efac" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">GBP / KES</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">KSh 175</text>
  </g>
  <g transform="translate(420, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#86efac" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">M-PESA SPEED</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="28" font-weight="700">in minutes</text>
  </g>
  <g transform="translate(760, 480)">
    <rect width="360" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#86efac" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">TOP PROVIDERS</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="26" font-weight="700">Wise · WorldRemit</text>
  </g>

  <text x="600" y="600" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
