<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e3f"/>
      <stop offset="100%" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="krw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cd2e3a"/>
      <stop offset="100%" stop-color="#0047a0"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.35" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0b1e3f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="360" r="260" fill="url(#globe)"/>

  <!-- Taegeuk-inspired badge -->
  <g transform="translate(1050, 90)" opacity="0.85">
    <circle r="50" cx="50" cy="50" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <path d="M 50,0 A 25 25 0 0 1 50 50 A 25 25 0 0 0 50 100 A 50 50 0 0 0 50 0 Z" fill="#cd2e3a"/>
    <path d="M 50,0 A 25 25 0 0 0 50 50 A 25 25 0 0 1 50 100 A 50 50 0 0 1 50 0 Z" fill="#0047a0"/>
  </g>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
  </g>

  <g transform="translate(80, 70)">
    <rect width="230" height="34" rx="17" fill="#0047a0"/>
    <text x="115" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">SOUTH KOREA · KRW</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="44" font-weight="700">Send Money to South Korea</text>
  <text x="80" y="225" fill="#93c5fd" font-family="system-ui" font-size="24" font-weight="500">KRW transfer guide · Toss · KakaoPay</text>

  <g transform="translate(640, 150)">
