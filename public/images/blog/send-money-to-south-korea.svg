    <text x="240" y="60" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">USD / KRW  ·  MID-MARKET</text>
    <text x="240" y="170" text-anchor="middle" fill="url(#krw)" font-family="system-ui" font-size="92" font-weight="800">₩ 1,378</text>
    <text x="240" y="205" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="18" font-weight="500">per US$1</text>
  </g>

  <g transform="translate(80, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">GBP / KRW</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">₩ 1,873</text>
  </g>
  <g transform="translate(420, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">ANNUAL LIMIT</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="28" font-weight="700">$50K (declared)</text>
  </g>
  <g transform="translate(760, 480)">
    <rect width="360" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">TOP PROVIDERS</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="26" font-weight="700">Wise · WireBarley</text>
