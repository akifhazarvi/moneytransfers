<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e3f"/>
      <stop offset="100%" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="tier" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.35" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0b1e3f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="360" r="260" fill="url(#globe)"/>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
  </g>

  <g transform="translate(80, 70)">
    <rect width="260" height="34" rx="17" fill="#ffffff14"/>
    <text x="130" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">INTERNATIONAL TRANSFER LIMITS</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="46" font-weight="700">International</text>
  <text x="80" y="232" fill="#ffffff" font-family="system-ui" font-size="46" font-weight="700">Transfer Limits</text>
  <text x="80" y="278" fill="#93c5fd" font-family="system-ui" font-size="22" font-weight="500">Provider, bank &amp; regulatory caps explained</text>

  <!-- Stacked tier bars -->
  <g transform="translate(640, 130)">
    <rect width="480" height="50" rx="12" fill="url(#tier)" opacity="0.5"/>
    <text x="20" y="33" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="700">$5,000</text>
    <text x="460" y="33" text-anchor="end" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">Wise daily (debit)</text>

    <rect y="60" width="480" height="50" rx="12" fill="url(#tier)" opacity="0.65"/>
    <text x="20" y="93" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="700">$10,000</text>
    <text x="460" y="93" text-anchor="end" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">FinCEN reporting trigger</text>

    <rect y="120" width="480" height="50" rx="12" fill="url(#tier)" opacity="0.8"/>
    <text x="20" y="153" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="700">$50,000</text>
    <text x="460" y="153" text-anchor="end" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">Wise · OFX typical cap</text>

    <rect y="180" width="480" height="50" rx="12" fill="url(#tier)"/>
    <text x="20" y="213" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="700">$1M+</text>
    <text x="460" y="213" text-anchor="end" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">FX broker dealing desk</text>
  </g>

  <g transform="translate(80, 410)">
    <rect width="500" height="120" rx="16" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="40" fill="#93c5fd" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">REPORTING THRESHOLD</text>
    <text x="24" y="90" fill="#ffffff" font-family="system-ui" font-size="36" font-weight="700">$10,000 / £1,000+</text>
  </g>

  <text x="600" y="605" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
