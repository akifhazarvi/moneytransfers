<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e3f"/>
      <stop offset="100%" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="numGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="globeBig" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#1d4ed8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0b1e3f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Big centered globe -->
  <g transform="translate(900, 320)">
    <circle r="200" fill="url(#globeBig)"/>
    <circle r="120" fill="none" stroke="#60a5fa55" stroke-width="1.5"/>
    <ellipse rx="120" ry="40" fill="none" stroke="#60a5fa44" stroke-width="1.2"/>
    <ellipse rx="120" ry="80" fill="none" stroke="#60a5fa33" stroke-width="1.2"/>
    <line x1="-120" y1="0" x2="120" y2="0" stroke="#60a5fa55" stroke-width="1.2"/>
    <line x1="0" y1="-120" x2="0" y2="120" stroke="#60a5fa44" stroke-width="1.2"/>
    <circle cx="-70" cy="-40" r="5" fill="#34d399"/>
    <circle cx="60" cy="-60" r="5" fill="#fbbf24"/>
    <circle cx="40" cy="50" r="5" fill="#f97316"/>
    <circle cx="-50" cy="70" r="5" fill="#ec4899"/>
  </g>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="700" y2="460"/>
    <line x1="80" y1="380" x2="700" y2="380"/>
  </g>

  <!-- Tag -->
  <g transform="translate(80, 70)">
    <rect width="220" height="34" rx="17" fill="#ffffff12"/>
    <text x="110" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">EXPAT TRANSFER GUIDE</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="48" font-weight="700">Expat Money</text>
  <text x="80" y="232" fill="#ffffff" font-family="system-ui" font-size="48" font-weight="700">Transfer Guide</text>
  <text x="80" y="278" fill="#93c5fd" font-family="system-ui" font-size="22" font-weight="500">Move salary, savings &amp; mortgages safely</text>

  <!-- Stat -->
  <g transform="translate(80, 410)">
    <rect width="620" height="160" rx="22" fill="#60a5fa12" stroke="#60a5fa" stroke-width="2"/>
    <text x="30" y="46" fill="#93c5fd" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="2">SUPPORTED CORRIDORS</text>
    <text x="30" y="125" fill="url(#numGrad)" font-family="system-ui" font-size="78" font-weight="800">64+</text>
    <text x="220" y="115" fill="#ffffff" font-family="system-ui" font-size="22" font-weight="600">currency routes</text>
    <text x="220" y="145" fill="#93c5fd" font-family="system-ui" font-size="16" font-weight="500">60+ providers compared</text>
  </g>

  <text x="600" y="605" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
