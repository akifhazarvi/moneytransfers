<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c0f10"/>
      <stop offset="100%" stop-color="#170707"/>
    </linearGradient>
    <linearGradient id="mad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c1272d"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.35" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#170707" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="360" r="260" fill="url(#globe)"/>

  <!-- Morocco flag accent: green star on red -->
  <g transform="translate(1080, 60)" opacity="0.7">
    <rect width="60" height="60" rx="6" fill="#c1272d"/>
    <polygon points="30,16 35,28 47,28 37,36 41,48 30,40 19,48 23,36 13,28 25,28" fill="none" stroke="#006233" stroke-width="2"/>
  </g>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
  </g>

  <g transform="translate(80, 70)">
    <rect width="230" height="34" rx="17" fill="#c1272d"/>
    <text x="115" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">MOROCCO · MAD GUIDE</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="46" font-weight="700">Send Money to Morocco</text>
  <text x="80" y="225" fill="#fb923c" font-family="system-ui" font-size="24" font-weight="500">MAD transfer guide · cash &amp; bank</text>

  <g transform="translate(640, 150)">
    <rect width="480" height="220" rx="24" fill="#c1272d15" stroke="#fb923c" stroke-width="2"/>
    <text x="240" y="60" text-anchor="middle" fill="#fb923c" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">USD / MAD  ·  MID-MARKET</text>
    <text x="240" y="170" text-anchor="middle" fill="url(#mad)" font-family="system-ui" font-size="100" font-weight="800">MAD 9.78</text>
    <text x="240" y="205" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="18" font-weight="500">per US$1</text>
  </g>

  <g transform="translate(80, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fb923c" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">EUR / MAD</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">MAD 10.74</text>
  </g>
  <g transform="translate(420, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fb923c" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">CASH NETWORK</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="28" font-weight="700">Cash Plus · Wafacash</text>
  </g>
  <g transform="translate(760, 480)">
    <rect width="360" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fb923c" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">TOP PROVIDERS</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="26" font-weight="700">Wise · WorldRemit</text>
  </g>

  <text x="600" y="615" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
