<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c1410"/>
      <stop offset="100%" stop-color="#150806"/>
    </linearGradient>
    <linearGradient id="lossGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <marker id="downArrow" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
    <line x1="80" y1="300" x2="1120" y2="300"/>
  </g>

  <!-- Pakistan flag tag -->
  <g transform="translate(80, 70)">
    <rect width="260" height="34" rx="17" fill="#01411C"/>
    <rect width="52" height="34" rx="17" fill="#ffffff"/>
    <circle cx="26" cy="17" r="9" fill="#01411C"/>
    <circle cx="30" cy="14" r="7" fill="#ffffff"/>
    <text x="160" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1">REMITTANCE COST REPORT</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="44" font-weight="700">How much does Pakistan</text>
  <text x="80" y="226" fill="#ffffff" font-family="system-ui" font-size="44" font-weight="700">lose on remittances?</text>
  <text x="80" y="270" fill="#fca5a5" font-family="system-ui" font-size="22" font-weight="500">FX spreads &amp; fees, by the numbers — 2026</text>

  <!-- Big loss number -->
  <g transform="translate(640, 130)">
    <rect width="480" height="220" rx="24" fill="#dc262615" stroke="#ef4444" stroke-width="2"/>
    <text x="240" y="58" text-anchor="middle" fill="#fca5a5" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">ANNUAL LOSS  ·  EST. 2026</text>
    <text x="240" y="160" text-anchor="middle" fill="url(#lossGrad)" font-family="system-ui" font-size="78" font-weight="800">$300M–$900M</text>
    <g transform="translate(160, 180)">
      <rect width="160" height="28" rx="14" fill="#991b1b"/>
      <text x="80" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">▼ per year</text>
    </g>
  </g>

  <!-- Trend down -->
  <polyline points="80,300 200,335 320,365 440,400 560,440" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" marker-end="url(#downArrow)"/>
  <circle cx="80" cy="300" r="6" fill="#ef4444"/>
  <circle cx="320" cy="365" r="6" fill="#ef4444"/>
  <circle cx="440" cy="400" r="6" fill="#ef4444"/>

  <!-- Stats -->
  <g transform="translate(80, 480)">
    <rect width="500" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fca5a5" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">AVG. SPREAD VS MID-MARKET</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">1.8% – 3.5%</text>
  </g>
  <g transform="translate(600, 480)">
    <rect width="520" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fca5a5" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">FY26 INFLOW</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">$41B official inflows</text>
  </g>

  <text x="600" y="615" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
