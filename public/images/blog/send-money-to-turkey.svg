    <text x="240" y="60" text-anchor="middle" fill="#fca5a5" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">USD / TRY  ·  MID-MARKET</text>
    <text x="240" y="170" text-anchor="middle" fill="url(#try)" font-family="system-ui" font-size="100" font-weight="800">₺ 39.2</text>
