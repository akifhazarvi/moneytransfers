      <text x="80" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">▼ TRY weakening</text>
    </g>
  </g>

  <g transform="translate(80, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fca5a5" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">EUR / TRY</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">₺ 45.8</text>
  </g>
  <g transform="translate(420, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fca5a5" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">GBP / TRY</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">₺ 53.2</text>
  </g>
  <g transform="translate(760, 480)">
