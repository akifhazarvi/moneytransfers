    <line x1="80" y1="380" x2="1120" y2="380"/>
  </g>

  <g transform="translate(80, 70)">
    <rect width="220" height="34" rx="17" fill="#e30a17"/>
    <text x="110" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">TURKEY · TRY GUIDE</text>
