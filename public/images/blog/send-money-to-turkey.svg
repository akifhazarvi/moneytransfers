    <text x="24" y="32" fill="#fca5a5" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">CBRT POLICY RATE</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="28" font-weight="700">42.5%</text>
