<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c0f0f"/>
      <stop offset="100%" stop-color="#170707"/>
    </linearGradient>
    <linearGradient id="try" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e30a17"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.35" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#170707" stop-opacity="0"/>
    </radialGradient>
    <marker id="downA" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#fca5a5"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="360" r="260" fill="url(#globe)"/>

  <!-- Crescent + star motif -->
  <g transform="translate(1040, 100)" opacity="0.85">
    <circle cx="50" cy="60" r="36" fill="#e30a17"/>
    <circle cx="58" cy="58" r="28" fill="#170707"/>
    <polygon points="78,60 84,72 96,72 87,80 90,92 78,84 66,92 69,80 60,72 72,72" fill="#ffffff"/>
  </g>

  <g stroke="#ffffff0a" stroke-width="1">
