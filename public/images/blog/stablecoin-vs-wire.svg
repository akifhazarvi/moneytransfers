<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e3f"/>
      <stop offset="100%" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="usdc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="swift" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#05101f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="400" r="320" fill="url(#globe)"/>

  <g transform="translate(80, 70)">
    <rect width="280" height="34" rx="17" fill="#ffffff14"/>
    <text x="140" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">STABLECOINS vs WIRE  · 2026</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="46" font-weight="700">Stablecoin vs Wire Transfer</text>
  <text x="80" y="225" fill="#93c5fd" font-family="system-ui" font-size="24" font-weight="500">Speed, cost, regulation: a 2026 comparison</text>

  <!-- Two cards face off -->
  <g transform="translate(80, 280)">
    <rect width="480" height="260" rx="24" fill="url(#usdc)" opacity="0.18"/>
    <rect width="480" height="260" rx="24" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <text x="240" y="60" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">STABLECOIN · USDC</text>
    <text x="240" y="140" text-anchor="middle" fill="url(#usdc)" font-family="system-ui" font-size="76" font-weight="800">~$0.50</text>
    <text x="240" y="180" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="20" font-weight="600">fee · minutes</text>
    <rect x="60" y="200" width="360" height="40" rx="20" fill="#1d4ed8"/>
    <text x="240" y="227" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="15" font-weight="700">24/7 · on-chain · self-custody risk</text>
  </g>

  <g transform="translate(640, 280)">
    <rect width="480" height="260" rx="24" fill="#ffffff10"/>
    <rect width="480" height="260" rx="24" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <text x="240" y="60" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">SWIFT WIRE</text>
    <text x="240" y="140" text-anchor="middle" fill="url(#swift)" font-family="system-ui" font-size="76" font-weight="800">$25–$50</text>
    <text x="240" y="180" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="20" font-weight="600">fee · 1–3 days</text>
    <rect x="60" y="200" width="360" height="40" rx="20" fill="#475569"/>
    <text x="240" y="227" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="15" font-weight="700">regulated · banking hours · FX margin</text>
  </g>

  <text x="600" y="600" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
