<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f36"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#ea4335"/>
    </linearGradient>
    <linearGradient id="revolutBadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#0c2a6b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="74" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="36" font-weight="700">SpaceX Goes Public at $1.75 Trillion</text>
  <text x="600" y="110" text-anchor="middle" fill="#ffffff80" font-family="system-ui" font-size="19">Here's how to buy SPCX shares through Revolut</text>

  <!-- Trajectory line -->
  <path d="M150,460 C 380,440 560,360 760,260 C 870,206 950,170 1010,140" fill="none" stroke="#ffffff20" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round"/>

  <!-- Rocket -->
  <g transform="translate(1010,140) rotate(-38)">
    <path d="M0,-56 C 20,-40 20,4 0,28 C -20,4 -20,-40 0,-56 Z" fill="#e8eaed"/>
    <circle cx="0" cy="-22" r="8" fill="#1a73e8"/>
    <path d="M-20,4 L -42,42 L -10,28 Z" fill="#9aa0a6"/>
    <path d="M20,4 L 42,42 L 10,28 Z" fill="#9aa0a6"/>
    <path d="M-9,28 L 9,28 L 0,62 Z" fill="url(#flame)"/>
  </g>

  <!-- Stock price card -->
  <g transform="translate(150,300)">
    <rect x="0" y="0" width="320" height="170" rx="20" fill="#ffffff10" stroke="#ffffff25"/>
    <text x="28" y="48" fill="#ffffff" font-family="system-ui" font-size="26" font-weight="700">SPCX</text>
    <text x="28" y="76" fill="#ffffffa0" font-family="system-ui" font-size="15">SpaceX Corp · NASDAQ</text>
    <text x="28" y="124" fill="#ffffff" font-family="system-ui" font-size="40" font-weight="700">$161.00</text>
    <text x="200" y="124" fill="#34a853" font-family="system-ui" font-size="22" font-weight="700">+19%</text>
    <text x="28" y="150" fill="#ffffff80" font-family="system-ui" font-size="14">IPO priced at $135 on Jun 12, 2026</text>
  </g>

  <!-- Revolut badge -->
  <g transform="translate(150,500)">
    <rect x="0" y="0" width="300" height="64" rx="32" fill="url(#revolutBadge)"/>
    <circle cx="42" cy="32" r="18" fill="#ffffff"/>
    <text x="42" y="40" text-anchor="middle" fill="#1a73e8" font-family="system-ui" font-size="20" font-weight="800">R</text>
    <text x="76" y="40" fill="#ffffff" font-family="system-ui" font-size="22" font-weight="700">Available on Revolut</text>
  </g>

  <!-- Footer -->
  <text x="600" y="605" text-anchor="middle" fill="#1a73e8" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
