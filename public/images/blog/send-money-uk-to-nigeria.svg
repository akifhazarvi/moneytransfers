    <radialGradient id="globe" cx="0.35" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#020e08" stop-opacity="0"/>
