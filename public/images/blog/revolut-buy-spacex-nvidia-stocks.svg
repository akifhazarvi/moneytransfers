<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="nvidiaGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9ae600"/>
      <stop offset="100%" stop-color="#5a8f00"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgLight)"/>

  <!-- Background rising trend line -->
  <polyline points="20,600 70,580 110,595 150,540 190,560 230,500 270,520 310,460 350,480 390,420 430,440 470,380 510,330 550,280 590,230 630,170 660,130" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- Candlesticks -->
  <g opacity="0.55">
    <line x1="1118" y1="200" x2="1118" y2="460" stroke="#c4b5fd" stroke-width="2"/>
    <rect x="1110" y="260" width="16" height="100" fill="#c4b5fd"/>
    <line x1="1141" y1="150" x2="1141" y2="420" stroke="#a78bfa" stroke-width="2"/>
    <rect x="1133" y="180" width="16" height="160" fill="#a78bfa"/>
    <line x1="1164" y1="230" x2="1164" y2="500" stroke="#c4b5fd" stroke-width="2"/>
    <rect x="1156" y="300" width="16" height="90" fill="#c4b5fd"/>
    <line x1="1187" y1="120" x2="1187" y2="380" stroke="#a78bfa" stroke-width="2"/>
    <rect x="1179" y="160" width="16" height="130" fill="#a78bfa"/>
  </g>

  <!-- Revolut wordmark -->
  <text x="50" y="178" fill="#0a0a0a" font-family="system-ui" font-size="52" font-weight="800" letter-spacing="-1">Revolut</text>

  <!-- SpaceX app icon -->
  <g>
    <rect x="310" y="60" width="170" height="170" rx="28" fill="#15151f"/>
    <g transform="translate(395,150) scale(1.05)">
      <path d="M0,-50 C18,-36 18,4 0,26 C-18,4 -18,-36 0,-50 Z" fill="#ffffff"/>
      <circle cx="0" cy="-18" r="7" fill="#15151f"/>
      <path d="M-18,4 L-38,38 L-9,26 Z" fill="#ffffff" opacity="0.85"/>
      <path d="M18,4 L38,38 L9,26 Z" fill="#ffffff" opacity="0.85"/>
      <path d="M-8,26 L8,26 L0,56 Z" fill="#a78bfa"/>
    </g>
  </g>

  <!-- Nvidia app icon -->
  <g>
    <rect x="410" y="190" width="170" height="170" rx="28" fill="url(#nvidiaGreen)"/>
    <g transform="translate(495,275)">
      <ellipse cx="0" cy="0" rx="55" ry="32" fill="none" stroke="#ffffff" stroke-width="10"/>
      <circle cx="0" cy="0" r="17" fill="#ffffff"/>
    </g>
    <rect x="546" y="326" width="28" height="28" rx="6" fill="#ffffff"/>
  </g>

  <!-- Phone mockup -->
  <g>
    <rect x="700" y="20" width="420" height="590" rx="54" fill="#0d0d0d"/>
    <rect x="722" y="62" width="376" height="506" rx="36" fill="#ffffff"/>
    <rect x="850" y="62" width="120" height="22" rx="11" fill="#0d0d0d"/>

    <text x="748" y="140" fill="#0a0a0a" font-family="system-ui" font-size="42" font-weight="800">Invest</text>

    <!-- Search bar -->
    <rect x="748" y="170" width="326" height="50" rx="25" fill="#f1f1f4"/>
    <circle cx="775" cy="194" r="8" fill="none" stroke="#9aa0a6" stroke-width="2"/>
    <line x1="781" y1="200" x2="787" y2="206" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round"/>
    <text x="800" y="200" fill="#9aa0a6" font-family="system-ui" font-size="15">Search stocks, ETFs, and more</text>

    <!-- Tabs -->
    <rect x="748" y="240" width="92" height="40" rx="20" fill="#ede9fe"/>
    <text x="794" y="265" text-anchor="middle" fill="#6d28d9" font-family="system-ui" font-size="16" font-weight="700">Stocks</text>
    <rect x="848" y="240" width="64" height="40" rx="20" fill="#f1f1f4"/>
    <text x="880" y="265" text-anchor="middle" fill="#5f6368" font-family="system-ui" font-size="16">ETFs</text>
    <rect x="920" y="240" width="108" height="40" rx="20" fill="#f1f1f4"/>
    <text x="974" y="265" text-anchor="middle" fill="#5f6368" font-family="system-ui" font-size="14">Commodities</text>
    <rect x="1036" y="240" width="58" height="40" rx="20" fill="#f1f1f4"/>
    <text x="1065" y="265" text-anchor="middle" fill="#5f6368" font-family="system-ui" font-size="14">Crypto</text>

    <!-- Stocks label -->
    <text x="748" y="330" fill="#0a0a0a" font-family="system-ui" font-size="22" font-weight="800">Stocks</text>

    <!-- SpaceX row -->
    <rect x="748" y="350" width="56" height="56" rx="14" fill="#15151f"/>
    <g transform="translate(776,380) scale(0.35)">
      <path d="M0,-50 C18,-36 18,4 0,26 C-18,4 -18,-36 0,-50 Z" fill="#ffffff"/>
      <circle cx="0" cy="-18" r="7" fill="#15151f"/>
      <path d="M-18,4 L-38,38 L-9,26 Z" fill="#ffffff" opacity="0.85"/>
      <path d="M18,4 L38,38 L9,26 Z" fill="#ffffff" opacity="0.85"/>
      <path d="M-8,26 L8,26 L0,56 Z" fill="#a78bfa"/>
    </g>
    <text x="818" y="372" fill="#0a0a0a" font-family="system-ui" font-size="19" font-weight="700">SpaceX</text>
    <text x="818" y="394" fill="#9aa0a6" font-family="system-ui" font-size="13">SPACEX &#183; Stock</text>
    <polyline points="950,400 970,392 985,396 1000,378 1015,384 1030,366 1045,372 1066,358" fill="none" stroke="#7c5cff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- NVIDIA row -->
    <rect x="748" y="440" width="56" height="56" rx="14" fill="url(#nvidiaGreen)"/>
    <g transform="translate(776,468)">
      <ellipse cx="0" cy="0" rx="16" ry="9.5" fill="none" stroke="#ffffff" stroke-width="3"/>
      <circle cx="0" cy="0" r="5" fill="#ffffff"/>
    </g>
    <text x="818" y="462" fill="#0a0a0a" font-family="system-ui" font-size="19" font-weight="700">NVIDIA</text>
    <text x="818" y="484" fill="#9aa0a6" font-family="system-ui" font-size="13">NVDA &#183; Stock</text>
    <polyline points="950,490 970,484 985,488 1000,472 1015,478 1030,462 1045,468 1066,452" fill="none" stroke="#34a853" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Footer -->
  <text x="600" y="614" text-anchor="middle" fill="#1a73e8" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
