<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e3f"/>
      <stop offset="100%" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="festive" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0b1e3f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="340" r="260" fill="url(#globe)"/>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
  </g>

  <!-- Festive accent band -->
  <rect x="80" y="125" width="6" height="380" fill="url(#festive)" rx="3"/>

  <!-- Tag -->
  <g transform="translate(80, 70)">
    <rect width="240" height="34" rx="17" fill="#ffffff12"/>
    <text x="120" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">FESTIVAL CORRIDOR GUIDE</text>
  </g>

  <!-- Headline -->
  <text x="110" y="200" fill="#ffffff" font-family="system-ui" font-size="48" font-weight="700">Eid &amp; Holi Money</text>
  <text x="110" y="252" fill="#ffffff" font-family="system-ui" font-size="48" font-weight="700">Transfer Guide 2026</text>
  <text x="110" y="298" fill="#fbbf24" font-family="system-ui" font-size="22" font-weight="500">Send home before the festival rate spike</text>

  <!-- Festive date card -->
  <g transform="translate(760, 360)">
    <rect width="360" height="160" rx="20" fill="#f59e0b15" stroke="#f59e0b" stroke-width="2"/>
    <text x="180" y="45" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="2">KEY DATES 2026</text>
    <rect x="30" y="60" width="140" height="38" rx="10" fill="#10b98122"/>
    <text x="100" y="85" text-anchor="middle" fill="#34d399" font-family="system-ui" font-size="15" font-weight="700">HOLI · MAR 14</text>
    <rect x="190" y="60" width="140" height="38" rx="10" fill="#ec489922"/>
    <text x="260" y="85" text-anchor="middle" fill="#f9a8d4" font-family="system-ui" font-size="15" font-weight="700">EID · MAR 31</text>
    <rect x="110" y="108" width="140" height="38" rx="10" fill="#f59e0b22"/>
    <text x="180" y="133" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="15" font-weight="700">EID · MAY 9</text>
  </g>

  <!-- Stat -->
  <g transform="translate(110, 420)">
    <rect width="600" height="100" rx="16" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="36" fill="#9aa6bf" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">PEAK CORRIDOR DEMAND WINDOW</text>
    <text x="24" y="80" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">Mar – May 2026 · UK · USA · GCC</text>
  </g>

  <text x="600" y="605" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
