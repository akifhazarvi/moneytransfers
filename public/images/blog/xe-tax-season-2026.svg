<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e3f"/>
      <stop offset="100%" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="taxNum" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.35" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#05101f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="360" r="260" fill="url(#globe)"/>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
  </g>

  <g transform="translate(80, 70)">
    <rect width="220" height="34" rx="17" fill="#b45309"/>
    <text x="110" y="23" text-anchor="middle" fill="#fde68a" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">TAX SEASON 2026</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="44" font-weight="700">Tax Season 2026</text>
  <text x="80" y="225" fill="#fbbf24" font-family="system-ui" font-size="24" font-weight="500">International transfer tax guide</text>

  <!-- Calendar-like deadline cards -->
  <g transform="translate(640, 130)">
    <rect width="480" height="220" rx="24" fill="#fbbf2412" stroke="#fbbf24" stroke-width="2"/>
    <text x="240" y="50" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">KEY DEADLINES</text>

    <rect x="40" y="80" width="180" height="110" rx="14" fill="#fbbf2422"/>
    <text x="130" y="115" text-anchor="middle" fill="#fde68a" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">US FILING</text>
    <text x="130" y="160" text-anchor="middle" fill="url(#taxNum)" font-family="system-ui" font-size="36" font-weight="800">Apr 15</text>

    <rect x="260" y="80" width="180" height="110" rx="14" fill="#fbbf2422"/>
    <text x="350" y="115" text-anchor="middle" fill="#fde68a" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">UK SELF-ASSESS</text>
    <text x="350" y="160" text-anchor="middle" fill="url(#taxNum)" font-family="system-ui" font-size="36" font-weight="800">Jan 31</text>
  </g>

  <g transform="translate(80, 480)">
    <rect width="500" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fbbf24" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">FBAR THRESHOLD</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">$10,000 aggregate</text>
  </g>
  <g transform="translate(600, 480)">
    <rect width="520" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fbbf24" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">GIFT TAX EXCLUSION</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">$18,000 / year (US)</text>
  </g>

  <text x="600" y="615" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
