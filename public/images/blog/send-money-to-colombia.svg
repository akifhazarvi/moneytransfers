<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e3f"/>
      <stop offset="100%" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="cop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.35" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0b1e3f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="360" r="260" fill="url(#globe)"/>

  <!-- Colombia tricolor band -->
  <g transform="translate(80, 290)">
    <rect width="510" height="20" rx="4" fill="#fcd116"/>
    <rect y="20" width="510" height="10" rx="0" fill="#003893"/>
    <rect y="30" width="510" height="10" rx="4" fill="#ce1126"/>
  </g>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
  </g>

  <g transform="translate(80, 70)">
    <rect width="230" height="34" rx="17" fill="#fcd116"/>
    <text x="115" y="23" text-anchor="middle" fill="#003893" font-family="system-ui" font-size="13" font-weight="700" letter-spacing="1.5">COLOMBIA · COP GUIDE</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="46" font-weight="700">Send Money to Colombia</text>
  <text x="80" y="225" fill="#fcd34d" font-family="system-ui" font-size="24" font-weight="500">COP transfer guide for 2026</text>

  <g transform="translate(640, 130)">
    <rect width="480" height="220" rx="24" fill="#fcd11612" stroke="#fcd116" stroke-width="2"/>
    <text x="240" y="60" text-anchor="middle" fill="#fcd34d" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">USD / COP  ·  MID-MARKET</text>
    <text x="240" y="170" text-anchor="middle" fill="url(#cop)" font-family="system-ui" font-size="92" font-weight="800">COP 4,180</text>
    <text x="240" y="205" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="18" font-weight="500">per US$1</text>
  </g>

  <g transform="translate(80, 480)">
    <rect width="500" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fcd34d" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">CHEAPEST FOR $1000</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="28" font-weight="700">Wise · Remitly · Xoom</text>
  </g>
  <g transform="translate(600, 480)">
    <rect width="520" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#fcd34d" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">CASH PICKUP NETWORKS</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="28" font-weight="700">Bancolombia · Efecty</text>
  </g>

  <text x="600" y="615" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
