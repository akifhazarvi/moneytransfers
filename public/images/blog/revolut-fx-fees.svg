<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e3f"/>
      <stop offset="100%" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="rev" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.35" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0b1e3f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="360" r="260" fill="url(#globe)"/>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
  </g>

  <!-- Tag -->
  <g transform="translate(80, 70)">
    <rect width="230" height="34" rx="17" fill="url(#rev)"/>
    <text x="115" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">REVOLUT FEE BREAKDOWN</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="46" font-weight="700">Revolut FX Fees</text>
  <text x="80" y="225" fill="#c4b5fd" font-family="system-ui" font-size="24" font-weight="500">What you actually pay in 2026</text>

  <!-- Markup stat card -->
  <g transform="translate(640, 130)">
    <rect width="480" height="220" rx="24" fill="#7c3aed15" stroke="#a78bfa" stroke-width="2"/>
    <text x="240" y="60" text-anchor="middle" fill="#c4b5fd" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">WEEKEND FX MARKUP</text>
    <text x="240" y="170" text-anchor="middle" fill="url(#rev)" font-family="system-ui" font-size="100" font-weight="800">0.5–1.5%</text>
    <text x="240" y="205" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="18" font-weight="500">+ above-allowance fee tier</text>
  </g>

  <!-- Fee tiers -->
  <g transform="translate(80, 320)">
    <rect width="500" height="70" rx="14" fill="#ffffff08" stroke="#ffffff18"/>
    <text x="20" y="30" fill="#c4b5fd" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">STANDARD</text>
    <text x="20" y="58" fill="#ffffff" font-family="system-ui" font-size="22" font-weight="700">£1,000/mo free, 0.5% after</text>
  </g>
  <g transform="translate(80, 410)">
    <rect width="500" height="70" rx="14" fill="#ffffff08" stroke="#ffffff18"/>
    <text x="20" y="30" fill="#c4b5fd" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">PREMIUM / METAL</text>
    <text x="20" y="58" fill="#ffffff" font-family="system-ui" font-size="22" font-weight="700">unlimited weekday FX</text>
  </g>
  <g transform="translate(80, 500)">
    <rect width="500" height="70" rx="14" fill="#ffffff08" stroke="#ffffff18"/>
    <text x="20" y="30" fill="#c4b5fd" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">WEEKEND</text>
    <text x="20" y="58" fill="#ffffff" font-family="system-ui" font-size="22" font-weight="700">+1% markup on majors</text>
  </g>

  <text x="600" y="605" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
