<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e3f"/>
      <stop offset="100%" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="dxy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <marker id="arrUS" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#fbbf24"/>
    </marker>
    <radialGradient id="globe" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#1d4ed8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0b1e3f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="340" r="260" fill="url(#globe)"/>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
    <line x1="80" y1="300" x2="1120" y2="300"/>
  </g>

  <g transform="translate(80, 70)">
    <rect width="240" height="34" rx="17" fill="#ffffff12"/>
    <text x="120" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">USD FORECAST 2026</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="48" font-weight="700">US Dollar Forecast 2026</text>
  <text x="80" y="225" fill="#93c5fd" font-family="system-ui" font-size="24" font-weight="500">DXY outlook for international senders</text>

  <!-- Trend line, gentle decline -->
  <polyline points="80,305 200,310 320,330 440,360 560,400" fill="none" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" marker-end="url(#arrUS)"/>
  <circle cx="80" cy="305" r="6" fill="#fbbf24"/>
  <circle cx="200" cy="310" r="6" fill="#fbbf24"/>
  <circle cx="320" cy="330" r="6" fill="#fbbf24"/>
  <circle cx="440" cy="360" r="6" fill="#fbbf24"/>

  <g transform="translate(640, 130)">
    <rect width="480" height="220" rx="24" fill="#60a5fa12" stroke="#60a5fa" stroke-width="2"/>
    <text x="240" y="60" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">DXY  ·  YEAR-END 2026</text>
    <text x="240" y="170" text-anchor="middle" fill="url(#dxy)" font-family="system-ui" font-size="112" font-weight="800">97.7</text>
    <g transform="translate(170, 180)">
      <rect width="140" height="28" rx="14" fill="#1d4ed8"/>
      <text x="70" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">▼ from peak</text>
    </g>
  </g>

  <g transform="translate(80, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">FED FUNDS</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">4.00–4.25%</text>
  </g>
  <g transform="translate(420, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">2026 RANGE</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">95.4 – 103.8</text>
  </g>
  <g transform="translate(760, 480)">
    <rect width="360" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">BIAS</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">soft &amp; choppy</text>
  </g>

  <text x="600" y="615" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
