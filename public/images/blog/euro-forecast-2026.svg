<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e3f"/>
      <stop offset="100%" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="eurGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <marker id="upArrow" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#34d399"/>
    </marker>
    <radialGradient id="globe" cx="0.35" cy="0.4" r="0.65">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0b1e3f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="360" r="280" fill="url(#globe)"/>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
    <line x1="80" y1="300" x2="1120" y2="300"/>
  </g>

  <!-- EU stars motif -->
  <g transform="translate(80, 70)">
    <rect width="210" height="34" rx="17" fill="#003399"/>
    <g fill="#fbbf24">
      <circle cx="22" cy="17" r="2.5"/><circle cx="35" cy="11" r="2.5"/><circle cx="48" cy="17" r="2.5"/>
      <circle cx="35" cy="23" r="2.5"/>
    </g>
    <text x="135" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">EUR FORECAST 2026</text>
  </g>

  <!-- Headline -->
  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="46" font-weight="700">EUR Forecast 2026</text>
  <text x="80" y="225" fill="#fbbf24" font-family="system-ui" font-size="24" font-weight="500">ECB, rates &amp; what it means for senders</text>

  <!-- Trend up line -->
  <polyline points="80,420 200,395 320,360 440,330 560,295" fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round" marker-end="url(#upArrow)"/>
  <circle cx="80" cy="420" r="6" fill="#34d399"/>
  <circle cx="200" cy="395" r="6" fill="#34d399"/>
  <circle cx="320" cy="360" r="6" fill="#34d399"/>
  <circle cx="440" cy="330" r="6" fill="#34d399"/>

  <!-- Big EUR/USD card -->
  <g transform="translate(640, 130)">
    <rect width="480" height="220" rx="24" fill="#fbbf2412" stroke="#fbbf24" stroke-width="2"/>
    <text x="240" y="60" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">EUR / USD  ·  YEAR-END 2026</text>
    <text x="240" y="160" text-anchor="middle" fill="url(#eurGrad)" font-family="system-ui" font-size="112" font-weight="800">1.17</text>
    <g transform="translate(170, 180)">
      <rect width="140" height="28" rx="14" fill="#059669"/>
      <text x="70" y="20" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">▲ Mild upside</text>
    </g>
  </g>

  <!-- Bottom stats -->
  <g transform="translate(80, 480)">
    <rect width="500" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">ECB POLICY RATE</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">2.25%  ·  hold-and-watch</text>
  </g>
  <g transform="translate(600, 480)">
    <rect width="520" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">2026 RANGE</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">1.08 – 1.21</text>
  </g>

  <text x="600" y="605" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
