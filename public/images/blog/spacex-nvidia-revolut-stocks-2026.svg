<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f36"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#34a853"/>
      <stop offset="100%" stop-color="#1a73e8"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#ea4335"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="58" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">The 2026 Stock-Buying Frenzy</text>
  <text x="600" y="92" text-anchor="middle" fill="#ffffff80" font-family="system-ui" font-size="18">SpaceX IPOs at $1.75T — Nvidia, Anthropic &amp; OpenAI could be next</text>

  <!-- Axis -->
  <line x1="120" y1="478" x2="1080" y2="478" stroke="#ffffff20" stroke-width="1"/>

  <!-- Rising chart line -->
  <path d="M120,452 C 280,438 380,400 480,360 C 600,310 720,250 860,190 C 950,152 1010,128 1050,110" fill="none" stroke="url(#chartLine)" stroke-width="6" stroke-linecap="round"/>

  <!-- Data points -->
  <circle cx="180" cy="446" r="7" fill="#ffffff"/>
  <circle cx="500" cy="352" r="7" fill="#ffffff"/>
  <circle cx="860" cy="190" r="7" fill="#ffffff"/>

  <!-- NVDA label -->
  <rect x="120" y="392" width="150" height="46" rx="10" fill="#ffffff14"/>
  <text x="195" y="414" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="17" font-weight="700">NVDA</text>
  <text x="195" y="432" text-anchor="middle" fill="#ffffffa0" font-family="system-ui" font-size="12">~$205-220 · Strong Buy</text>

  <!-- SPCX label -->
  <rect x="430" y="270" width="170" height="46" rx="10" fill="#ffffff14"/>
  <text x="515" y="292" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="17" font-weight="700">SPCX</text>
  <text x="515" y="310" text-anchor="middle" fill="#ffffffa0" font-family="system-ui" font-size="12">IPO $135 → ~$161 (+19%)</text>

  <!-- Anthropic / OpenAI label -->
  <rect x="700" y="120" width="220" height="50" rx="10" fill="#34a85322" stroke="#34a853" stroke-width="1.5"/>
  <text x="810" y="142" text-anchor="middle" fill="#34a853" font-family="system-ui" font-size="17" font-weight="700">Anthropic + OpenAI</text>
  <text x="810" y="160" text-anchor="middle" fill="#ffffffb0" font-family="system-ui" font-size="12">IPOs filed — $965B / up to $852B</text>

  <!-- Rocket -->
  <g transform="translate(1050,108) rotate(-38)">
    <path d="M0,-42 C 15,-30 15,2 0,20 C -15,2 -15,-30 0,-42 Z" fill="#e8eaed"/>
    <circle cx="0" cy="-16" r="6" fill="#1a73e8"/>
    <path d="M-15,2 L -32,32 L -8,20 Z" fill="#9aa0a6"/>
    <path d="M15,2 L 32,32 L 8,20 Z" fill="#9aa0a6"/>
    <path d="M-7,20 L 7,20 L 0,46 Z" fill="url(#flame)"/>
  </g>

  <!-- Bottom badge -->
  <rect x="340" y="538" width="520" height="56" rx="28" fill="#ffffff12" stroke="#ffffff30"/>
  <text x="600" y="573" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="20" font-weight="600">Buy in via Revolut, Cash App or M1 Finance</text>

  <!-- Footer -->
  <text x="600" y="615" text-anchor="middle" fill="#1a73e8" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
