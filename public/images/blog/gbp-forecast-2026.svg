<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e3f"/>
      <stop offset="100%" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="gbpGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.35" cy="0.4" r="0.65">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0b1e3f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="360" r="280" fill="url(#globe)"/>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
  </g>

  <!-- Union jack inspired strip -->
  <g transform="translate(80, 70)">
    <rect width="230" height="34" rx="17" fill="#012169"/>
    <rect x="0" y="14" width="230" height="6" fill="#ffffff" opacity="0.9"/>
    <rect x="0" y="16" width="230" height="3" fill="#c8102e"/>
    <text x="115" y="23" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">GBP FORECAST 2026</text>
  </g>

  <text x="80" y="180" fill="#ffffff" font-family="system-ui" font-size="46" font-weight="700">GBP Forecast 2026</text>
  <text x="80" y="225" fill="#93c5fd" font-family="system-ui" font-size="24" font-weight="500">Pound outlook for international senders</text>

  <!-- Range visualization -->
  <g transform="translate(80, 320)">
    <text x="0" y="0" fill="#9aa6bf" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">2026 RANGE  GBP / USD</text>
    <rect x="0" y="20" width="500" height="14" rx="7" fill="#ffffff14"/>
    <rect x="80" y="20" width="320" height="14" rx="7" fill="url(#gbpGrad)"/>
    <circle cx="220" cy="27" r="9" fill="#ffffff"/>
    <text x="0" y="60" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">1.26</text>
    <text x="395" y="60" fill="#ffffff" font-family="system-ui" font-size="14" font-weight="600">1.42</text>
  </g>

  <!-- Big stat -->
  <g transform="translate(640, 130)">
    <rect width="480" height="220" rx="24" fill="#60a5fa12" stroke="#60a5fa" stroke-width="2"/>
    <text x="240" y="60" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">GBP / USD  ·  YEAR-END</text>
    <text x="240" y="160" text-anchor="middle" fill="url(#gbpGrad)" font-family="system-ui" font-size="112" font-weight="800">1.35</text>
    <text x="240" y="200" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="18" font-weight="500">central forecast</text>
  </g>

  <!-- Stats -->
  <g transform="translate(80, 460)">
    <rect width="500" height="110" rx="16" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="40" fill="#93c5fd" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">BoE BANK RATE</text>
    <text x="24" y="84" fill="#ffffff" font-family="system-ui" font-size="34" font-weight="700">4.00%  ·  cutting bias</text>
  </g>
  <g transform="translate(600, 460)">
    <rect width="520" height="110" rx="16" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="40" fill="#93c5fd" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">GBP / EUR</text>
    <text x="24" y="84" fill="#ffffff" font-family="system-ui" font-size="34" font-weight="700">1.15  ·  range-bound</text>
  </g>

  <text x="600" y="615" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
