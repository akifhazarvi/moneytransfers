<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c1410"/>
      <stop offset="100%" stop-color="#150806"/>
    </linearGradient>
    <linearGradient id="eur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffc400"/>
      <stop offset="100%" stop-color="#c60b1e"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.35" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#150806" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="320" cy="360" r="260" fill="url(#globe)"/>

  <!-- Spanish flag band top/bottom -->
  <rect x="0" y="0" width="1200" height="8" fill="#c60b1e"/>
  <rect x="0" y="8" width="1200" height="14" fill="#ffc400"/>
  <rect x="0" y="22" width="1200" height="8" fill="#c60b1e"/>

  <g stroke="#ffffff0a" stroke-width="1">
    <line x1="80" y1="460" x2="1120" y2="460"/>
    <line x1="80" y1="380" x2="1120" y2="380"/>
  </g>

  <g transform="translate(80, 80)">
    <rect width="220" height="34" rx="17" fill="#c60b1e"/>
    <text x="110" y="23" text-anchor="middle" fill="#ffc400" font-family="system-ui" font-size="13" font-weight="600" letter-spacing="1.5">SPAIN · EUR GUIDE</text>
  </g>

  <text x="80" y="190" fill="#ffffff" font-family="system-ui" font-size="46" font-weight="700">Send Money to Spain</text>
  <text x="80" y="235" fill="#ffc400" font-family="system-ui" font-size="24" font-weight="500">EUR guide · SEPA Instant in 10 seconds</text>

  <g transform="translate(640, 150)">
    <rect width="480" height="220" rx="24" fill="#ffc40015" stroke="#ffc400" stroke-width="2"/>
    <text x="240" y="60" text-anchor="middle" fill="#ffc400" font-family="system-ui" font-size="14" font-weight="600" letter-spacing="2">USD / EUR  ·  MID-MARKET</text>
    <text x="240" y="170" text-anchor="middle" fill="url(#eur)" font-family="system-ui" font-size="104" font-weight="800">€0.86</text>
    <text x="240" y="205" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="18" font-weight="500">per US$1</text>
  </g>

  <g transform="translate(80, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#ffc400" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">GBP / EUR</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="32" font-weight="700">€1.17</text>
  </g>
  <g transform="translate(420, 480)">
    <rect width="320" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#ffc400" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">SEPA INSTANT</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="28" font-weight="700">10 sec · 24/7</text>
  </g>
  <g transform="translate(760, 480)">
    <rect width="360" height="90" rx="14" fill="#ffffff0a" stroke="#ffffff18"/>
    <text x="24" y="32" fill="#ffc400" font-family="system-ui" font-size="12" font-weight="600" letter-spacing="1.5">TOP PROVIDERS</text>
    <text x="24" y="72" fill="#ffffff" font-family="system-ui" font-size="26" font-weight="700">Wise · Revolut</text>
  </g>

  <text x="600" y="615" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="16" font-weight="600">sendmoneycompare.com</text>
</svg>
