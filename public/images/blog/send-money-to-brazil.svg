      <stop offset="0%" stop-color="#06281a"/>
      <stop offset="100%" stop-color="#031108"/>
    </linearGradient>
    <linearGradient id="brl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
