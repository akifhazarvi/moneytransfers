<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background: rounded square like modern app icons -->
  <rect width="32" height="32" rx="7" fill="#2D3A8C"/>
  <!-- Stylized comparison arrows forming an abstract "S" shape -->
  <!-- Top arrow: moving right (sending) -->
  <path d="M8 11h10" stroke="#C7D2F6" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M15 7.5L18.5 11 15 14.5" stroke="#C7D2F6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Bottom arrow: moving left (receiving) — in amber accent -->
  <path d="M24 21H14" stroke="#F59E0B" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M17 17.5L13.5 21 17 24.5" stroke="#F59E0B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
