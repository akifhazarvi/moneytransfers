<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D3A8C"/>
      <stop offset="100%" stop-color="#1E2761"/>
    </linearGradient>
  </defs>
  <!-- Premium rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Abstract "S" formed by two flowing paths — represents Send + Compare flow -->
  <!-- Top curve: outward flow (sending) — light indigo -->
  <path d="M9 10.5C9 10.5 13 10.5 16 10.5C20.5 10.5 23 12.5 23 15C23 17.5 20.5 19 16 19"
        stroke="#C7D2F6" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- Bottom curve: return flow (receiving/comparing) — amber accent -->
  <path d="M23 21.5C23 21.5 19 21.5 16 21.5C11.5 21.5 9 19.5 9 17C9 14.5 11.5 13 16 13"
        stroke="#F59E0B" stroke-width="2.8" stroke-linecap="round" fill="none"/>
</svg>
